        Setoran ke Admin: <b>${fmtRp(s.totalAdmin||s.total)}</b><br>
        Keuntungan Reseller: <b style="color:var(--primary-dark)">${fmtRp(s.resellerProfit||0)}</b>
      `:`
        Total: <b>${fmtRp(s.total)}</b> · Fee bank (${s.bankFeePct||0}%): <b>${fmtRp(s.bankFee||0)}</b> · Laba: <b>${fmtRp(s.profit)}</b>
      `}
    </div>
    ${s.catatan?`<div class="muted" style="margin-top:6px">📝 ${esc(s.catatan)}</div>`:''}
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Tutup</button></div>
  `);
}
function delSale(id){
  const s=load(K.sales).find(x=>x.id===id); if(!s) return;
  const prodList=(s.items||[]).map(i=>esc(i.nama)+(i.varian?' ('+esc(i.varian)+')':'')+' ×'+i.qty).join(', ');
  openModal(`
    <h3>🗑 Hapus Penjualan</h3>
    <p style="margin-bottom:8px">Penjualan <b>${fmtDate(s.tanggal)}</b> · ${esc(s.pelangganNama||'Umum')} · <b>${fmtRp(s.total)}</b></p>
    <p class="muted" style="font-size:12.5px;margin-bottom:14px">Produk: ${prodList}</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-ghost" style="justify-content:flex-start;text-align:left;padding:14px 16px" onclick="confirmDelSale('${id}',true)">
        <span style="font-size:18px">↩️</span>
        <span><b>Hapus & Kembalikan Stok</b><br><span class="muted" style="font-size:12px">Qty produk dikembalikan ke stok seperti semula</span></span>
      </button>
      <button class="btn btn-ghost" style="justify-content:flex-start;text-align:left;padding:14px 16px" onclick="confirmDelSale('${id}',false)">
        <span style="font-size:18px">🗑</span>
        <span><b>Hapus Tanpa Kembalikan Stok</b><br><span class="muted" style="font-size:12px">Stok tetap seperti sekarang (tidak berubah)</span></span>
      </button>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
    </div>
  `);
}
function confirmDelSale(id, returnStock){
  const sales=load(K.sales);
  const s=sales.find(x=>x.id===id); if(!s){ closeModal(); return; }
  if(returnStock){
    const stock=load(K.stock);
    (s.items||[]).forEach(it=>{
      const p=stock.find(x=>x.id===it.prodId);
      if(p){ p.qty += (it.qty||0); }
    });
    save(K.stock, stock);
  }
  save(K.sales, sales.filter(x=>x.id!==id));
  const cs=load(K.customers); cs.forEach(c=>{ c.transaksi=(c.transaksi||[]).filter(t=>t.saleId!==id); }); save(K.customers, cs);
  logActivity('penjualan','penjualan','Hapus penjualan'+(returnStock?' (stok dikembalikan)':''));
  closeModal(); toast(returnStock?'Penjualan dihapus, stok dikembalikan ✓':'Penjualan dihapus (stok tidak berubah)','success');
  renderView();
}

/* ════════════════════════════════════════════════
   6. PELANGGAN CICILAN
   ════════════════════════════════════════════════ */
function sisaCicilan(c){
  let sisa=0;
  (c.transaksi||[]).forEach(t=>{ const dibayar=(t.pembayaran||[]).reduce((s,p)=>s+p.jumlah,0); sisa += Math.max(0,(t.total||0)-dibayar); });
  return sisa;
}
function renderPelanggan(host){
  const list=load(K.customers);
  host.innerHTML=`
    <div class="topbar"><div><h2>Pelanggan Cicilan</h2><div class="sub">Tagih & kelola pembayaran cicilan</div></div></div>
    <div class="section">
      ${list.length===0?`<div class="empty"><div class="ico">👥</div>Belum ada pelanggan cicilan.</div>`:
      `<div style="overflow-x:auto"><table><thead><tr><th>Pelanggan</th><th>Kontak</th><th class="text-right">Total</th><th class="text-right">Dibayar</th><th class="text-right">Sisa</th><th></th></tr></thead><tbody>
      ${list.map(c=>{
        const totP=(c.transaksi||[]).reduce((s,t)=>s+(t.total||0),0);
        const totB=(c.transaksi||[]).reduce((s,t)=>s+(t.pembayaran||[]).reduce((x,p)=>x+p.jumlah,0),0);
        const sisa=totP-totB;
        return `<tr><td><b>${esc(c.nama)}</b></td><td>${esc(c.kontak||'-')}</td>
          <td class="text-right">${fmtRp(totP)}</td><td class="text-right">${fmtRp(totB)}</td>
          <td class="text-right"><span class="pill ${sisa>0?'pill-amber':'pill-green'}">${fmtRp(sisa)}</span></td>
          <td class="text-right" style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="editPelanggan('${c.id}')">✏️ Edit</button>
            <button class="btn btn-primary btn-sm" onclick="viewPelanggan('${c.id}')">Kelola</button>
          </td>
        </tr>`;
      }).join('')}</tbody></table></div>`}
    </div>
  `;
}
function viewPelanggan(id){
  const c=load(K.customers).find(x=>x.id===id); if(!c) return;
  const salesAll=load(K.sales);
  const totP=(c.transaksi||[]).reduce((s,t)=>s+(t.total||0),0);
  const totB=(c.transaksi||[]).reduce((s,t)=>s+(t.pembayaran||[]).reduce((x,p)=>x+p.jumlah,0),0);
  openModal(`
    <h3>👤 ${esc(c.nama)}</h3>
    <div class="muted" style="margin-bottom:8px">${esc(c.kontak||'-')}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <span class="pill pill-blue">Total cicil: <b>${fmtRp(totP)}</b></span>
      <span class="pill pill-green">Dibayar: <b>${fmtRp(totB)}</b></span>
      <span class="pill ${(totP-totB)>0?'pill-amber':'pill-green'}">Sisa: <b>${fmtRp(totP-totB)}</b></span>
    </div>
    ${(c.transaksi||[]).slice().sort((a,b)=>b.tanggal-a.tanggal).map(t=>{
      const dibayar=(t.pembayaran||[]).reduce((s,p)=>s+p.jumlah,0);
      const sisa=Math.max(0,t.total-dibayar);
      const sale=salesAll.find(x=>x.id===t.saleId);
      const items=t.items||(sale&&sale.items)||[];
      return `<div class="card" style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;align-items:center">
          <div><b>${fmtDate(t.tanggal)}</b>${t.janjiPelunasan?` · <span style="color:var(--accent)">📝 Janji: ${esc(t.janjiPelunasan)}</span>`:' <span class="muted" style="font-size:11px">(tidak ada janji)</span>'}</div>
          <div class="text-right">
            <div style="font-weight:800">${fmtRp(t.total)}</div>
            <div class="muted" style="font-size:11px">Dibayar ${fmtRp(dibayar)} · Sisa <span style="color:${sisa>0?'var(--warning)':'var(--success)'}">${fmtRp(sisa)}</span></div>
          </div>
        </div>
        ${items.length?`<div style="margin-top:6px;font-size:12px;color:var(--muted)">${items.map(i=>esc(i.nama||'')+(i.varian?' ('+esc(i.varian)+')':'')+(i.qty?' ×'+i.qty:'')).join(', ')}</div>`:''}
        ${(t.pembayaran||[]).length?`<div style="margin-top:8px;border-top:1px dashed var(--border);padding-top:6px">
          <div style="font-size:11.5px;color:var(--muted);margin-bottom:4px"><b>Riwayat Pembayaran:</b></div>
          ${t.pembayaran.slice().sort((a,b)=>b.tanggal-a.tanggal).map(p=>`
            <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;padding:3px 0">
              <span>${fmtDate(p.tanggal)} · <b>${fmtRp(p.jumlah)}</b></span>
              <span>
                <button class="btn btn-ghost btn-sm" onclick="editPembayaran('${c.id}','${t.id}','${p.id}')">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="delPembayaran('${c.id}','${t.id}','${p.id}')">×</button>
              </span>
            </div>
          `).join('')}
        </div>`:''}
        ${sisa>0?`<div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="text" inputmode="decimal" id="pay-${t.id}" placeholder="Jumlah bayar" style="flex:1;min-width:120px">
          <button class="btn btn-primary btn-sm" onclick="bayarCicilan('${c.id}','${t.id}')">Catat Bayar</button>
        </div>`:''}
      </div>`;
    }).join('')}
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Tutup</button></div>
  `);
}
function editPelanggan(id){
  const c=load(K.customers).find(x=>x.id===id); if(!c) return;
  openModal(`
    <h3>✏️ Edit Pelanggan</h3>
    <div class="field"><label>Nama</label><input id="cp-nama" value="${esc(c.nama)}"></div>
    <div class="field"><label>Kontak</label><input id="cp-kontak" value="${esc(c.kontak||'')}"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="savePelangganEdit('${c.id}')">Simpan</button>
    </div>
  `);
}
function savePelangganEdit(id){
  const cs=load(K.customers); const c=cs.find(x=>x.id===id); if(!c) return;
  c.nama=val('cp-nama').trim()||c.nama; c.kontak=val('cp-kontak').trim();
  save(K.customers, cs); closeModal(); toast('Pelanggan diperbarui','success'); renderView();
}
function bayarCicilan(cid, tid){
  const j=+(document.getElementById('pay-'+tid)||{}).value||0;
  if(!j||j<=0){ toast('Masukkan jumlah','danger'); return; }
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=c.transaksi.find(x=>x.id===tid); if(!t) return;
  t.pembayaran=t.pembayaran||[]; t.pembayaran.push({id:uid(),tanggal:Date.now(),jumlah:j});
  save(K.customers,cs);
  logActivity('pelanggan','pelanggan',`Bayar cicilan ${c.nama} ${fmtRp(j)}`, cid);
  toast('Pembayaran dicatat','success'); viewPelanggan(cid);
}
function editPembayaran(cid, tid, pid){
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=(c.transaksi||[]).find(x=>x.id===tid); if(!t) return;
  const p=(t.pembayaran||[]).find(x=>x.id===pid); if(!p) return;
  openModal(`
    <h3>✏️ Edit Pembayaran</h3>
    <div class="muted" style="margin-bottom:8px">${esc(c.nama)} · Transaksi ${fmtDate(t.tanggal)}</div>
    <div class="row">
      <div class="field"><label>Tanggal Bayar</label><input type="date" id="ep-tgl" value="${toDateInput(p.tanggal)}"></div>
      <div class="field"><label>Jumlah *</label><input type="text" inputmode="decimal" id="ep-jml" value="${p.jumlah||0}"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger" onclick="delPembayaran('${cid}','${tid}','${pid}')">Hapus</button>
      <button class="btn btn-ghost" onclick="viewPelanggan('${cid}')">Batal</button>
      <button class="btn btn-primary" onclick="savePembayaranEdit('${cid}','${tid}','${pid}')">Simpan</button>
    </div>
  `);
}
function savePembayaranEdit(cid, tid, pid){
  const j=+val('ep-jml')||0;
  if(!j||j<=0){ toast('Jumlah wajib','danger'); return; }
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=(c.transaksi||[]).find(x=>x.id===tid); if(!t) return;
  const p=(t.pembayaran||[]).find(x=>x.id===pid); if(!p) return;
  p.jumlah=j;
  p.tanggal=new Date(val('ep-tgl')).getTime()||p.tanggal||Date.now();
  save(K.customers,cs);
  logActivity('pelanggan','pelanggan',`Edit pembayaran cicilan ${c.nama} → ${fmtRp(j)}`, cid);
  toast('Pembayaran diperbarui','success'); viewPelanggan(cid);
}
function delPembayaran(cid, tid, pid){
  if(!confirm('Hapus pembayaran ini? Uang akan dikembalikan ke sisa cicilan.')) return;
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=(c.transaksi||[]).find(x=>x.id===tid); if(!t) return;
  const before=(t.pembayaran||[]).length;
  t.pembayaran=(t.pembayaran||[]).filter(x=>x.id!==pid);
  if(t.pembayaran.length===before){ toast('Pembayaran tidak ditemukan','danger'); return; }
  save(K.customers,cs);
  logActivity('pelanggan','pelanggan',`Hapus pembayaran cicilan ${c.nama}`, cid);
  toast('Pembayaran dihapus','success'); viewPelanggan(cid);
}

/* ════════════════════════════════════════════════
   7. SHARE PRODUK
   ════════════════════════════════════════════════ */
function renderShare(host){
  const stock=load(K.stock).filter(p=>(p.qty||0)>0).slice().sort((a,b)=>a.nama.localeCompare(b.nama));
  const allStock=load(K.stock);
  host.innerHTML=`
    <div class="topbar"><div><h2>Share Produk</h2><div class="sub">Bagikan daftar produk ready stok via WhatsApp</div></div></div>
    <div class="section">
      <div class="section-head"><h3>Produk Ready Stok (${stock.length})</h3>
        <div class="actions">
          <button class="btn btn-primary" onclick="shareReadyStock(false)">📤 Share ke WA</button>
          <button class="btn btn-ghost" onclick="shareReadyStock(true)">📤 + Harga Beli</button>
        </div>
      </div>
      ${stock.length===0?`<div class="empty"><div class="ico">📦</div>Tidak ada produk ready stok.</div>`:
      `<div style="overflow-x:auto"><table><thead><tr><th>Produk</th><th class="text-right">Stok</th><th class="text-right">Harga Jual</th></tr></thead><tbody>
      ${stock.map(p=>`<tr>
        <td><b>${esc(p.nama)}</b>${p.varian?` <span class="muted">(${esc(p.varian)})</span>`:''}</td>
        <td class="text-right"><span class="pill pill-green">${p.qty}</span></td>
        <td class="text-right"><b>${fmtRp(p.hargaJual)}</b></td>
      </tr>`).join('')}
      </tbody></table></div>`}
      ${allStock.length>stock.length?`<div class="muted" style="font-size:11.5px;margin-top:8px">${allStock.length-stock.length} produk stok kosong tidak dibagikan.</div>`:''}
    </div>
  `;
}
function shareReadyStock(withBeli){
  const stock=load(K.stock).filter(p=>(p.qty||0)>0).slice().sort((a,b)=>a.nama.localeCompare(b.nama));
  if(stock.length===0){ toast('Tidak ada produk ready stok','danger'); return; }
  const today = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  let text = `*🛒 DAFTAR PRODUK READY STOK*\n_per ${today}_\n\n`;
  stock.forEach((p,idx)=>{
    text += `${idx+1}. *${p.nama}*${p.varian?' ('+p.varian+')':''}\n`;
    text += `   Stok: ${p.qty} pcs · Harga: ${fmtRp(p.hargaJual)}`;
    if(withBeli) text += ` · (modal: ${fmtRp(p.hargaBeli)})`;
    text += `\n`;
  });
  text += `\n💬 Pesan langsung WA untuk pesan.`;
  openModal(`
    <h3>📤 Bagikan Daftar Ready Stok</h3>
    <p class="muted" style="font-size:12px">Edit teks di bawah sebelum dibagikan.</p>
    <textarea id="share-text" rows="12" style="font-family:monospace;font-size:12px">${esc(text)}</textarea>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Tutup</button>
      <button class="btn btn-ghost" onclick="copyShare()">📋 Salin</button>
      <button class="btn btn-primary" onclick="waShare()">💬 Buka WhatsApp</button>
    </div>
  `);
}
function copyShare(){ navigator.clipboard.writeText(document.getElementById('share-text').value).then(()=>toast('Tersalin','success')); }
function waShare(){ const t=encodeURIComponent(document.getElementById('share-text').value); window.open('https://wa.me/?text='+t,'_blank'); }

/* ════════════════════════════════════════════════
   8. HUTANG BANK
   ════════════════════════════════════════════════ */
function sisaHutang(d){
  const bayar=(d.pembayaran||[]).reduce((s,p)=>s+p.jumlah,0);
  return Math.max(0,(d.totalPinjaman||0)-bayar);
}
function renderHutang(host){
  const list=load(K.bankDebts);
  host.innerHTML=`
    <div class="topbar"><div><h2>Hutang Bank</h2><div class="sub">Catat pinjaman & pembayaran angsuran</div></div>
      <button class="btn btn-primary" onclick="editDebt()">+ Hutang Baru</button>
    </div>
    <div class="section">
      ${list.length===0?`<div class="empty"><div class="ico">🏦</div>Belum ada hutang bank.</div>`:
      list.map(d=>{
        const sisa=sisaHutang(d);
        return `<div class="card" style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px">
            <div><b>${esc(d.nama)}</b> <span class="muted">· ${esc(d.bank||'-')}</span>
              <div class="muted" style="font-size:11.5px">Pinjam ${fmtDate(d.tanggal)} · Tenor ${d.tenor||'-'} bln · Angsuran/bln ${fmtRp(d.angsuran||0)}</div>
            </div>
            <div class="text-right">
              <div style="font-weight:800;color:var(--primary-dark)">Sisa ${fmtRp(sisa)}</div>
              <div class="muted" style="font-size:11px">dari ${fmtRp(d.totalPinjaman)}</div>
            </div>
          </div>
          <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
            <input type="text" inputmode="decimal" id="h-bayar-${d.id}" placeholder="Jumlah bayar" style="flex:1;min-width:120px">
            <button class="btn btn-primary btn-sm" onclick="bayarDebt('${d.id}')">Catat Bayar</button>
            <button class="btn btn-ghost btn-sm" onclick="editDebt('${d.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="delDebt('${d.id}')">×</button>
          </div>
          ${(d.pembayaran||[]).length?`<div style="margin-top:6px;font-size:11.5px;color:var(--muted)">Riwayat: ${d.pembayaran.map(p=>fmtDate(p.tanggal)+' '+fmtRp(p.jumlah)).join(' · ')}</div>`:''}
        </div>`;
      }).join('')}
    </div>
  `;
}
function editDebt(id){
  const list=load(K.bankDebts);
  const d = id ? list.find(x=>x.id===id) : {id:uid(),nama:'',bank:'',totalPinjaman:0,tenor:12,angsuran:0,tanggal:Date.now(),catatan:'',pembayaran:[]};
  openModal(`
    <h3>${id?'Edit':'Tambah'} Hutang Bank</h3>
    <div class="row">
      <div class="field"><label>Nama / Tujuan *</label><input id="d-nama" value="${esc(d.nama)}"></div>
      <div class="field"><label>Bank/Lembaga</label><input id="d-bank" value="${esc(d.bank||'')}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Total Pinjaman *</label><input type="text" inputmode="decimal" id="d-tot" value="${d.totalPinjaman||0}"></div>
      <div class="field"><label>Tenor (bulan)</label><input type="text" inputmode="decimal" id="d-ten" value="${d.tenor||12}"></div>
      <div class="field"><label>Angsuran / bulan</label><input type="text" inputmode="decimal" id="d-ang" value="${d.angsuran||0}"></div>
    </div>
    <div class="field"><label>Tanggal Pinjam</label><input type="date" id="d-tgl" value="${toDateInput(d.tanggal)}"></div>
    <div class="field"><label>Catatan</label><textarea id="d-cat" rows="2">${esc(d.catatan||'')}</textarea></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveDebt('${d.id}',${!!id})">Simpan</button>
    </div>
  `);
}
function saveDebt(id, isEdit){
  const list=load(K.bankDebts);
  const cur = isEdit ? list.find(x=>x.id===id) : {id, pembayaran:[]};
  cur.nama=val('d-nama').trim(); cur.bank=val('d-bank').trim();
  cur.totalPinjaman=+val('d-tot')||0; cur.tenor=+val('d-ten')||0;
  cur.angsuran=+val('d-ang')||0; cur.tanggal=new Date(val('d-tgl')).getTime()||Date.now();
  cur.catatan=val('d-cat').trim();
  if(!cur.nama||!cur.totalPinjaman){ toast('Nama & pinjaman wajib','danger'); return; }
  if(!isEdit) list.push(cur);
  save(K.bankDebts, list);
  logActivity('hutang','hutang',(isEdit?'Edit':'Tambah')+' hutang bank: '+cur.nama, id);
  closeModal(); toast('Hutang disimpan','success'); renderView();
}
function bayarDebt(id){
  const j=+document.getElementById('h-bayar-'+id).value;
  if(!j||j<=0){ toast('Masukkan jumlah','danger'); return; }
  const list=load(K.bankDebts); const d=list.find(x=>x.id===id);
  d.pembayaran=d.pembayaran||[]; d.pembayaran.push({id:uid(),tanggal:Date.now(),jumlah:j});
  save(K.bankDebts,list);
  logActivity('hutang','hutang',`Bayar hutang ${d.nama} ${fmtRp(j)}`, id);
  toast('Tercatat','success'); renderView();
}
function delDebt(id){
  if(!confirm('Hapus hutang ini?')) return;
  save(K.bankDebts, load(K.bankDebts).filter(x=>x.id!==id));
  logActivity('hutang','hutang','Hapus hutang');
  renderView();
}

/* ════════════════════════════════════════════════
   9. PENGELUARAN OPERASIONAL
   ════════════════════════════════════════════════ */
function renderPengeluaran(host){
  const list=load(K.expenses).slice().sort((a,b)=>b.tanggal-a.tanggal);
  const total=list.reduce((s,e)=>s+(e.jumlah||0),0);
  const bulanIni=list.filter(e=>sameMonth(e.tanggal)).reduce((s,e)=>s+(e.jumlah||0),0);
  host.innerHTML=`
    <div class="topbar"><div><h2>Pengeluaran Operasional</h2><div class="sub">Pulsa, listrik, transport, dll.</div></div>
      <button class="btn btn-primary" onclick="editExp()">+ Pengeluaran</button>
    </div>
    <div class="grid grid-2">
      <div class="card"><h3>Total Sepanjang Waktu</h3><div class="val">${fmtRp(total)}</div></div>
      <div class="card"><h3>Bulan Ini</h3><div class="val">${fmtRp(bulanIni)}</div></div>
    </div>
    <div class="section">
      ${list.length===0?`<div class="empty"><div class="ico">💸</div>Belum ada pengeluaran.</div>`:
      `<div style="overflow-x:auto"><table><thead><tr><th>Tanggal</th><th>Kategori</th><th>Keterangan</th><th class="text-right">Jumlah</th><th></th></tr></thead><tbody>
      ${list.map(e=>`<tr><td>${fmtDate(e.tanggal)}</td><td><span class="pill pill-blue">${esc(e.kategori||'-')}</span></td><td>${esc(e.keterangan||'-')}</td><td class="text-right"><b>${fmtRp(e.jumlah)}</b></td>
        <td class="text-right"><button class="btn btn-ghost btn-sm" onclick="editExp('${e.id}')">Edit</button> <button class="btn btn-danger btn-sm" onclick="delExp('${e.id}')">×</button></td></tr>`).join('')}</tbody></table></div>`}
    </div>
  `;
}
function editExp(id){
  const list=load(K.expenses);
  const e = id ? list.find(x=>x.id===id) : {id:uid(), tanggal:Date.now(), kategori:'', keterangan:'', jumlah:0};
  const katSugg = uniqVals(list, x=>x.kategori).concat(['Pulsa/Data','Listrik','Air','Transport','Gaji','Sewa','Lain-lain']);
  const uniqKat = [...new Set(katSugg)];
  const ketSugg = uniqVals(list, x=>x.keterangan);
  openModal(`
    <h3>${id?'Edit':'Tambah'} Pengeluaran</h3>
    ${dataList('dl-e-kat', uniqKat)}${dataList('dl-e-ket', ketSugg)}
    <div class="row">
      <div class="field"><label>Tanggal</label><input type="date" id="e-tgl" value="${toDateInput(e.tanggal)}"></div>
      <div class="field"><label>Kategori</label><input id="e-kat" list="dl-e-kat" value="${esc(e.kategori||'')}" placeholder="ketik atau pilih"></div>
      <div class="field"><label>Jumlah *</label><input type="text" inputmode="decimal" id="e-jml" value="${e.jumlah||0}"></div>
    </div>
    <div class="field"><label>Keterangan</label><input id="e-ket" list="dl-e-ket" value="${esc(e.keterangan||'')}"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="saveExp('${e.id}',${!!id})">Simpan</button>
    </div>
  `);
}
function saveExp(id, isEdit){
  const list=load(K.expenses);
  const cur = isEdit ? list.find(x=>x.id===id) : {id};
  cur.tanggal=new Date(val('e-tgl')).getTime()||Date.now();
  cur.kategori=val('e-kat').trim()||'Lain-lain';
  cur.jumlah=+val('e-jml')||0;
  cur.keterangan=val('e-ket').trim();
  if(!cur.jumlah){ toast('Jumlah wajib','danger'); return; }
  if(!isEdit) list.push(cur);
  save(K.expenses, list);
  logActivity('pengeluaran','pengeluaran',`${isEdit?'Edit':'Catat'} pengeluaran ${cur.kategori} ${fmtRp(cur.jumlah)}`, id);
  closeModal(); toast('Tersimpan','success'); renderView();
}
function delExp(id){
  if(!confirm('Hapus pengeluaran ini?')) return;
  save(K.expenses, load(K.expenses).filter(x=>x.id!==id));
  logActivity('pengeluaran','pengeluaran','Hapus pengeluaran');
  renderView();
}

const AK_BIG_THRESHOLD = 1000000;
const AK_DUP_WINDOW_MS = 5*60*1000;

function fmtTanggalLengkap(d){
  if(!d) return '-';
  const dt=new Date(d);
  const tgl=dt.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const jam=dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}).replace(':','.');
  return tgl+', '+jam;
}
function fmtRpOrDash(n){ return (n>0) ? fmtRp(n) : '-'; }

/* Saldo awal kas (default Rp 0, tanggal = hari ini) */
function getSaldoAwal(){
  try{ const v=JSON.parse(localStorage.getItem(K.saldoAwal)||'null'); if(v) return v; }catch(e){}
  return { jumlah:0, tanggal:Date.now(), catatan:'' };
}
function saveSaldoAwalData(d){ localStorage.setItem(K.saldoAwal, JSON.stringify(d)); }

/* Build a unified cash-flow stream from ALL data sources */
function buildArusKas(){
  const rows=[];
  // 0. Saldo awal kas → ditampilkan sebagai baris pertama (masuk jika +, keluar jika -)
  const sa=getSaldoAwal();
  rows.push({
    at: sa.tanggal||0,
    jenis:'Saldo Awal',
    detail:'Saldo awal kas usaha'+(sa.catatan?' — '+sa.catatan:''),
    keluar: (sa.jumlah||0) < 0 ? -sa.jumlah : 0,
    masuk:  (sa.jumlah||0) > 0 ?  sa.jumlah : 0,
    srcKey:'opening', srcTab:'aruskas',
    edited:false,
  });
  // 1. Penjualan
  //    - Cash → masuk (uang lunas masuk)
  //    - Cicil → KELUAR (piutang: stok keluar tapi uang belum masuk, jadi kas minus dulu;
  //              pembayaran cicilan nanti akan menambah masuk sehingga arus kas kembali positif)
  load(K.sales).forEach(s=>{
    const refTotal = s.totalAdmin || s.total || 0;
    if(s.metode==='cash'){
      rows.push({
        at:s.tanggal||0,
        jenis:'Penjualan',
        detail:'Penjualan cash'+(s.pelangganNama?' ('+s.pelangganNama+')':' (umum)'),
        keluar:0, masuk:refTotal,
        srcKey:'sale:'+s.id, srcTab:'penjualan',
        edited:false,
      });
    } else if(s.metode==='cicil'){
      rows.push({
        at:s.tanggal||0,
        jenis:'Penjualan',
        detail:'Penjualan cicilan'+(s.pelangganNama?' ('+s.pelangganNama+')':'')+' — piutang',
        keluar:refTotal, masuk:0,
        srcKey:'salecicil:'+s.id, srcTab:'penjualan',
        edited:false,
      });
    }
  });
  // 2. Pembayaran cicilan pelanggan → masuk
  load(K.customers).forEach(c=>{
    (c.transaksi||[]).forEach(t=>{
      (t.pembayaran||[]).forEach(p=>{
        rows.push({
          at:p.tanggal||0,
          jenis:'Cicilan',
          detail:'Pembayaran cicilan ('+c.nama+')',
          keluar:0, masuk:p.jumlah||0,
          srcKey:'pay:'+p.id, srcTab:'pelanggan',
          edited:false,
        });
      });
    });
  });
  // 3. Order ke supplier → keluar (status received gunakan tanggalTerima, else tanggal order)
  load(K.orders).forEach(o=>{
    const supName=(load(K.suppliers).find(s=>s.id===o.supplierId)||{}).nama || o.supplierNama || 'Supplier';
    rows.push({
      at:o.tanggalTerima||o.tanggal||0,
      jenis:'Stok',
      detail:'Order supplier ('+supName+')',
      keluar:o.totalBiaya||0, masuk:0,
      srcKey:'order:'+o.id, srcTab:'simulasiorder',
      edited:false,
    });
  });
  // 4. Pengeluaran operasional → keluar
  load(K.expenses).forEach(e=>{
    rows.push({
      at:e.tanggal||0,
      jenis:'Pengeluaran',
      detail:(e.kategori||'Pengeluaran')+(e.keterangan?' — '+e.keterangan:''),
      keluar:e.jumlah||0, masuk:0,
      srcKey:'exp:'+e.id, srcTab:'pengeluaran',
      edited:false,
    });
  });
  // 5. Hutang bank: pencairan → masuk, angsuran → keluar
  load(K.bankDebts).forEach(d=>{
    rows.push({
      at:d.tanggal||0,
      jenis:'Hutang Bank',
      detail:'Pencairan pinjaman ('+(d.nama||d.bank||'-')+')',
      keluar:0, masuk:d.totalPinjaman||0,
      srcKey:'debt:'+d.id, srcTab:'hutang',
      edited:false,
    });
    (d.pembayaran||[]).forEach(p=>{
      rows.push({
        at:p.tanggal||0,
        jenis:'Hutang Bank',
        detail:'Angsuran '+(d.nama||d.bank||'-'),
        keluar:p.jumlah||0, masuk:0,
        srcKey:'debtpay:'+p.id, srcTab:'hutang',
        edited:false,
      });
    });
  });
  // 6. Setoran reseller → masuk (uang masuk ke admin)
  load(K.resellerSetoran).forEach(s=>{
    rows.push({
      at:s.at||0,
      jenis:'Setoran',
      detail:'Setoran reseller ('+(s.resellerNama||'-')+')',
      keluar:0, masuk:s.amount||0,
      srcKey:'setor:'+s.id, srcTab:'reseller',
      edited:false,
    });
  });

  // Sort ascending by time (oldest first) — saldo berjalan
  rows.sort((a,b)=>(a.at||0)-(b.at||0));
  let saldo=0;
  rows.forEach(r=>{
    saldo += (r.masuk||0) - (r.keluar||0);
    r.saldo = saldo;
  });

  // Suspicious detection
  detectSuspicious(rows);
  return rows;
}

function detectSuspicious(rows){
  // Index by signature for duplicate check
  rows.forEach((r,i)=>{
    r._sus=[]; // array of reasons
    // (a) saldo negatif (cumulative)
    if(r.saldo < 0) r._sus.push('Saldo berjalan menjadi minus.');
    // (b) nominal sangat besar (selain Hutang Bank)
    const big = Math.max(r.keluar||0, r.masuk||0);
    if(r.jenis!=='Hutang Bank' && big >= AK_BIG_THRESHOLD)
      r._sus.push('Nominal sangat besar ('+fmtRp(big)+').');
  });
  // (c) duplikat: jenis+detail+nominal sama dalam window
  for(let i=0;i<rows.length;i++){
    for(let j=i+1;j<rows.length;j++){
      const a=rows[i], b=rows[j];
      if(Math.abs((a.at||0)-(b.at||0)) > AK_DUP_WINDOW_MS) break;
      if(a.jenis===b.jenis && a.detail===b.detail
         && a.keluar===b.keluar && a.masuk===b.masuk
         && a.srcKey!==b.srcKey){
        const msg='Kemungkinan dobel dengan entri lain ('+fmtTanggalLengkap(b.at===a.at?b.at:b.at)+').';
        if(!a._sus.some(x=>x.startsWith('Kemungkinan dobel'))) a._sus.push(msg);
        if(!b._sus.some(x=>x.startsWith('Kemungkinan dobel'))) b._sus.push('Kemungkinan dobel dengan entri lain ('+fmtTanggalLengkap(a.at)+').');
      }
    }
  }
  // (d) cross-source: penjualan cash + setoran/cicilan dgn nominal sama dlm 1 jam
  const sales = rows.filter(r=>r.jenis==='Penjualan');
  const others = rows.filter(r=>r.jenis==='Cicilan'||r.jenis==='Setoran');
  sales.forEach(s=>{
    others.forEach(o=>{
      if(s.masuk>0 && s.masuk===o.masuk && Math.abs((s.at||0)-(o.at||0))<=60*60*1000){
        if(!s._sus.some(x=>x.startsWith('Berpotensi tercatat ganda')))
          s._sus.push('Berpotensi tercatat ganda lewat sumber lain ('+o.jenis+').');
        if(!o._sus.some(x=>x.startsWith('Berpotensi tercatat ganda')))
          o._sus.push('Berpotensi tercatat ganda dengan Penjualan langsung.');
      }
    });
  });
}

function akJenisClass(j){
  return 'ak-jenis-'+(j.toLowerCase().split(' ')[0].replace('hutang','hutang').replace('piutang','piutang'));
}

function renderArusKas(host){

    if(f.jenis!=='semua' && r.jenis!==f.jenis) return false;
    if(f.q && !(r.detail+' '+r.jenis).toLowerCase().includes(f.q.toLowerCase())) return false;
    if(f.periode==='hari'){ if(now-r.at > 24*3600*1000) return false; }
    else if(f.periode==='minggu'){ if(now-r.at > 7*24*3600*1000) return false; }
    else if(f.periode==='bulan'){
      const d=new Date(r.at), n=new Date();
      if(d.getMonth()!==n.getMonth()||d.getFullYear()!==n.getFullYear()) return false;
    }
    return true;
  });

  const totKeluar=rows.reduce((s,r)=>s+(r.keluar||0),0);
  const totMasuk =rows.reduce((s,r)=>s+(r.masuk||0),0);
  const saldoAkhir = all.length ? all[all.length-1].saldo : 0;
  const susCount = rows.filter(r=>r._sus && r._sus.length).length;

  const display = rows.slice().reverse();

  host.innerHTML=`

      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:#fff;font-size:12px;cursor:pointer" onclick="openSaldoAwal()" title="Atur saldo awal kas usaha">
          💼 Saldo Awal: <b>${fmtRp(getSaldoAwal().jumlah||0)}</b> · ✏️ Atur
        </span>
        <button class="btn btn-ghost btn-sm" onclick="exportAKCsv()">⬇️ Export CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="window.print()">🖨️ Cetak</button>
      </div>
    </div>

    <div class="ak-summary">
      <div class="card"><h3>Total Masuk</h3><div class="val" style="color:#047857">${fmtRp(totMasuk)}</div><div class="delta">${rows.filter(r=>r.masuk>0).length} transaksi</div></div>
      <div class="card"><h3>Total Keluar</h3><div class="val" style="color:#B91C1C">${fmtRp(totKeluar)}</div><div class="delta">${rows.filter(r=>r.keluar>0).length} transaksi</div></div>
      <div class="card"><h3>Saldo Akhir</h3><div class="val" style="color:${saldoAkhir<0?'#B91C1C':'var(--primary-dark)'}">${fmtRp(saldoAkhir)}</div><div class="delta">Akumulasi semua waktu</div></div>
    </div>

    ${susCount>0?`<div class="ak-warning-banner">⚠️ <span><b>${susCount} aktivitas mencurigakan</b> terdeteksi pada daftar ini. Baris bertanda merah perlu Anda periksa (kemungkinan dobel, saldo minus, atau nominal tidak wajar).</span></div>`:''}

    <div class="ak-toolbar">
      <select onchange="_akFilter.periode=this.value; renderView()">
        <option value="semua" ${f.periode==='semua'?'selected':''}>Semua periode</option>
        <option value="hari" ${f.periode==='hari'?'selected':''}>Hari ini</option>
        <option value="minggu" ${f.periode==='minggu'?'selected':''}>7 hari</option>
        <option value="bulan" ${f.periode==='bulan'?'selected':''}>Bulan ini</option>
      </select>
      <select onchange="_akFilter.jenis=this.value; renderView()">
        <option value="semua" ${f.jenis==='semua'?'selected':''}>Semua jenis</option>
        ${['Saldo Awal','Penjualan','Stok','Cicilan','Pengeluaran','Hutang Bank','Setoran'].map(j=>`<option ${f.jenis===j?'selected':''}>${j}</option>`).join('')}

    </div>

    <div style="overflow-x:auto">
    <table class="ak-table">
      <thead><tr>
        <th class="col-no">No</th><th>Waktu</th><th>Jenis</th><th>Detail</th>
        <th class="col-num">Keluar</th><th class="col-num">Masuk</th><th class="col-num">Saldo</th>
      </tr></thead>
      <tbody>
        ${display.length===0?`<tr><td colspan="7" class="ak-empty">Belum ada arus kas pada filter ini.</td></tr>`:
          display.map((r,idx)=>{

            const susTitle=(r._sus||[]).join(' \n');

function exportAKCsv(){
  const rows=buildArusKas();
  const header=['No','Waktu','Jenis','Detail','Keluar','Masuk','Saldo','Catatan'];
  const lines=[header.join(',')];
  rows.forEach((r,i)=>{
    const cells=[
      i+1,
      '"'+fmtTanggalLengkap(r.at)+'"',
      r.jenis,
      '"'+(r.detail||'').replace(/"/g,'""')+'"',
      r.keluar||0, r.masuk||0, r.saldo||0,
      '"'+((r._sus||[]).join(' | ').replace(/"/g,'""'))+'"',
    ];
    lines.push(cells.join(','));
  });
  const blob=new Blob([lines.join('\n')], {type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='arus-kas-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

/* ──── Migrasi Restock Lama → Arus Kas ──── */
function scanRestockMigrasi(){
  const acts=load(K.activity);
  const orders=load(K.orders);
  const re=/^Restock\s+(\d+)\s+produk\s+·\s+total\s+Rp([\d.,]+)$/i;
  const items=[];
  acts.forEach(a=>{
    const m=(a.message||'').match(re); if(!m) return;
    const total=parseInt(m[2].replace(/[^\d]/g,''),10)||0;
    if(total<=0) return;
    // anti-double: skip jika sudah ada order migrated dgn tanggal+total sama
    const dup=orders.find(o=>o.migrated && o.tanggal===a.at && o.totalBiaya===total);
    if(dup) return;
    items.push({at:a.at, total, nProduk:parseInt(m[1],10)||0});
  });
  return items;
}
function openMigrasiRestock(){
  const items=scanRestockMigrasi();
  if(items.length===0){
    openModal(`
      <h3>🔧 Migrasi Restock Lama</h3>
      <p style="font-size:13px;margin:10px 0">Tidak ada entri restock lama yang perlu dimigrasi.<br><span class="muted" style="font-size:12px">(Log aktivitas dibatasi 500 entri terbaru, sebagian data lama mungkin sudah hilang.)</span></p>
      <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Tutup</button></div>
    `);
    return;
  }
  const total=items.reduce((s,i)=>s+i.total,0);
  const tglMin=Math.min(...items.map(i=>i.at));
  const tglMax=Math.max(...items.map(i=>i.at));
  openModal(`
    <h3>🔧 Migrasi Restock Lama → Arus Kas</h3>
    <p style="font-size:13px;margin:10px 0">Ditemukan <b>${items.length} entri</b> restock di log aktivitas yang belum tercatat di Arus Kas:</p>
    <ul style="font-size:13px;line-height:1.7;padding-left:18px">
      <li>Total nominal: <b>${fmtRp(total)}</b></li>
      <li>Rentang tanggal: ${fmtDate(tglMin)} – ${fmtDate(tglMax)}</li>
    </ul>
    <p class="muted" style="font-size:12px;margin-top:8px">⚠️ Tindakan ini bersifat idempoten — entri yang sama tidak akan diduplikasi jika dijalankan ulang.</p>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="runMigrasiRestock()">Jalankan Migrasi</button>
    </div>
  `);
}
function runMigrasiRestock(){
  const items=scanRestockMigrasi();
  const orders=load(K.orders);
  items.forEach(it=>{
    orders.push({
      id: uid(),
      supplierId: null,
      supplierNama: 'Restock manual (migrasi)',
      tanggal: it.at,

   ════════════════════════════════════════════════ */
window._gsStatus = 'idle'; // 'idle' | 'on' | 'off'
function renderGSChip(){
  const cfg=getGSConfig();
  const label = !cfg.url ? 'GSheets: Belum diset'
              : window._gsStatus==='on' ? 'GSheets: Tersambung'
              : window._gsStatus==='off' ? 'GSheets: Gagal'
              : 'GSheets: Cek…';
  const cls = !cfg.url ? 'idle' : window._gsStatus;
  const html = `<span class="gs-chip ${cls}" onclick="pingGS(true)" title="Klik untuk tes ulang"><span class="dot"></span>${label}</span>`;
  const w1=document.getElementById('gs-chip-wrap'); if(w1) w1.innerHTML=html;
  const w2=document.getElementById('gs-chip-mobile-wrap'); if(w2) w2.innerHTML=html;
}
async function pingGS(manual){
  const cfg=getGSConfig();
  if(!cfg.url){ window._gsStatus='idle'; renderGSChip(); if(manual) toast('Belum ada URL Web App. Isi di Pengaturan.','danger'); return; }
  window._gsStatus='idle'; renderGSChip();
  try{
    const ctl = new AbortController();
    const t = setTimeout(()=>ctl.abort(), 8000);
    const res = await fetch(cfg.url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'ping', token: cfg.token||'' }),
      signal: ctl.signal,
    });
    clearTimeout(t);
    if(!res.ok) throw new Error('HTTP '+res.status);
    // Apps Script "ping" may not be implemented — treat 200 as connected
    window._gsStatus='on';
    if(manual) toast('Google Sheets tersambung ✓','success');
  }catch(e){
    window._gsStatus='off';
    if(manual) toast('Gagal terhubung: '+e.message,'danger');
  }
  renderGSChip();
}

function setor(){
  const u=currentUser();
  const setoranList=load(K.resellerSetoran);
  const mySetoran=setoranList.filter(s=>s.resellerId===u.id);
  const lastAt=mySetoran.length ? Math.max(...mySetoran.map(s=>s.at)) : 0;
  const mySales=load(K.sales).filter(s=>s.byResellerId===u.id);
  const pendingSales=mySales.filter(s=>s.tanggal>lastAt);
  const pendingSetoran=pendingSales.reduce((s,x)=>s+(x.totalAdmin||0),0);
  const pendingKeunt=pendingSales.reduce((s,x)=>s+(x.resellerProfit||0),0);
  const pendingOmzet=pendingSales.reduce((s,x)=>s+(x.totalReseller||x.total||0),0);
  if(pendingSetoran<=0){ toast('Tidak ada setoran yang perlu dibayar.',''); return; }
  if(!confirm(
    `Konfirmasi setor ke admin:\n\nOmzet periode ini : ${fmtRp(pendingOmzet)}\nJumlah disetor    : ${fmtRp(pendingSetoran)}\nKeuntungan kamu   : ${fmtRp(pendingKeunt)}\n\nSetelah konfirmasi, rekap akan direset ke nol.`
  )) return;
  const record={id:uid(),resellerId:u.id,resellerNama:u.nama,at:Date.now(),amount:pendingSetoran,omzet:pendingOmzet,profit:pendingKeunt};
  setoranList.push(record);
  save(K.resellerSetoran, setoranList);
  logActivity('setoran','reseller',`${u.nama} setor ke admin: ${fmtRp(pendingSetoran)}`);
  toast('Setoran dicatat! Rekap direset ke nol. ✓','success');
  renderView();
}

function saveGSConfig(){
  const url=val('gs-url').trim(); const token=val('gs-token').trim();
  if(url && !url.startsWith('https://')){ toast('URL tidak valid','danger'); return; }
  const cfg=getGSConfig();
  save(K.gsConfig, Object.assign(cfg, {url, token}));
  toast('Konfigurasi tersimpan','success');
  renderView();
}

async function pullFromCloud(){
  const cfg=getGSConfig();
  if(!cfg.url){ toast('Isi URL Web App dulu','danger'); return; }
  toast('Menarik data dari cloud…');
  const markAttempt = (ok, msg)=>{
    const c=getGSConfig();
    c.lastSyncAttempt=Date.now();
    if(ok){ c.lastSync=Date.now(); c.lastSyncStatus='success'; c.lastSyncError=''; }
    else { c.lastSyncStatus='error'; c.lastSyncError=msg||''; }
    save(K.gsConfig, c);
  };
  try{
    const res = await fetch(cfg.url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'pull', token: cfg.token||'' })
    });
    const json = await res.json();
    if(!json.ok){
      markAttempt(false, json.msg||'Error tidak diketahui');
      toast('Gagal: '+(json.msg||'Error tidak diketahui'),'danger');
      renderView(); return;
    }
    const data=json.data||{};
    let imported=0;
    Object.keys(K).forEach(k=>{
      if(k==='gsConfig') return;
      const sheetKey = K[k].replace('bld_','');
      if(data[sheetKey] !== undefined){
        save(K[k], data[sheetKey]);
        imported++;
      }
    });
    markAttempt(true);
    toast(`Data ditarik (${imported} tabel)  ✓`,'success');
    renderView();
  }catch(e){
    markAttempt(false, e.message);
    toast('Gagal terhubung: '+e.message,'danger');
    renderView();
  }
}

async function pushToCloud(){
  const cfg=getGSConfig();
  if(!cfg.url){ toast('Isi URL Web App dulu','danger'); return; }
  if(!confirm('Dorong semua data lokal ke Google Sheets? Data di cloud akan ditimpa.')) return;
  toast('Mendorong data ke cloud…');
  const markAttempt = (ok, msg)=>{
    const c=getGSConfig();
    c.lastSyncAttempt=Date.now();
    if(ok){ c.lastSync=Date.now(); c.lastSyncStatus='success'; c.lastSyncError=''; }
    else { c.lastSyncStatus='error'; c.lastSyncError=msg||''; }
    save(K.gsConfig, c);
  };
  try{
    const payload={};
    Object.keys(K).forEach(k=>{
      if(k==='gsConfig') return;
      const sheetKey = K[k].replace('bld_','');
      payload[sheetKey] = load(K[k]);
    });
    const res = await fetch(cfg.url, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'push', token: cfg.token||'', payload })
    });
    const json = await res.json();
    if(!json.ok){
      markAttempt(false, json.msg||'Error tidak diketahui');
      toast('Gagal: '+(json.msg||'Error tidak diketahui'),'danger');
      renderView(); return;
    }
    markAttempt(true);
    toast('Semua data berhasil disinkron ke cloud  ✓','success');
    renderView();
  }catch(e){
    markAttempt(false, e.message);
    toast('Gagal terhubung: '+e.message,'danger');
    renderView();
  }
}

function showAppsScript(){
  const scriptCode = `// ============================================================
// Balanga Lo Depula v13.1 — Google Apps Script
// Deploy sebagai Web App dengan akses: Anyone
// ============================================================
const SECRET_TOKEN = ''; // Isi sama dengan Token Rahasia di Pengaturan

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    if (SECRET_TOKEN && data.token !== SECRET_TOKEN) {
      return out({ok: false, msg: 'Token salah'});
    }
    const ss = SpreadsheetApp.getActiveSpreadsheet();

    if (data.action === 'push') {
      const payload = data.payload || {};
      Object.keys(payload).forEach(sheetKey => {
        let sheet = ss.getSheetByName(sheetKey);
        if (!sheet) sheet = ss.insertSheet(sheetKey);
        sheet.clearContents();
        const rows = payload[sheetKey];
        if (Array.isArray(rows) && rows.length > 0) {
          const headers = Object.keys(rows[0]);
          sheet.appendRow(headers);
          rows.forEach(row => sheet.appendRow(headers.map(h => {
            const v = row[h];
            return (typeof v === 'object') ? JSON.stringify(v) : (v === undefined ? '' : v);
          })));
        } else {
          sheet.appendRow([JSON.stringify(rows)]);
        }
      });
      return out({ok: true, msg: 'Data tersimpan ke Google Sheets'});
    }

    if (data.action === 'pull') {
      const result = {};
      ss.getSheets().forEach(sheet => {
        const name = sheet.getName();
        const vals = sheet.getDataRange().getValues();
        if (vals.length <= 1) { result[name] = []; return; }
        const headers = vals[0];
        result[name] = vals.slice(1).map(row => {
          const obj = {};
          headers.forEach((h, i) => {
            try { obj[h] = JSON.parse(row[i]); } catch(e) { obj[h] = row[i]; }
          });
          return obj;
        });
      });
      return out({ok: true, data: result});
    }

    return out({ok: false, msg: 'Action tidak dikenal'});
  } catch(e) {
    return out({ok: false, msg: e.toString()});
  }
}

function doGet(e) { return doPost(e); }

function out(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`;

  openModal(`
    <h3>📋 Kode Google Apps Script</h3>
    <p class="muted" style="font-size:12px;margin-bottom:8px">Salin kode di bawah, tempel ke Apps Script, lalu Deploy → New deployment → Web app (akses: <b>Anyone</b>).</p>
    <textarea id="script-code" rows="16" style="font-family:monospace;font-size:11px;background:#f8f9fa">${esc(scriptCode)}</textarea>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Tutup</button>
      <button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.getElementById('script-code').value).then(()=>toast('Kode disalin ✓','success'))">📋 Salin Kode</button>
    </div>
  `);
}

function exportAll(){
  const data={}; Object.keys(K).forEach(k=>data[k]=load(K[k]));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='balanga-backup-v13.1-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importAll(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const data=JSON.parse(r.result);
    if(!confirm('Tindih semua data dengan isi file?')) return;
    Object.keys(K).forEach(k=>{ if(data[k]) save(K[k],data[k]); });
    toast('Data dipulihkan','success'); renderView();
  }catch(e){ toast('File tidak valid','danger'); }};
  r.readAsText(f);
}
function resetAll(){
  if(!confirm('HAPUS SEMUA DATA?')) return;
  if(!confirm('Konfirmasi sekali lagi — tindakan ini permanen.')) return;
  Object.keys(K).forEach(k=>localStorage.removeItem(K[k]));
  toast('Direset','success'); location.reload();
}
