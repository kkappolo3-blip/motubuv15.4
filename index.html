<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --primary:#a04a2c;
    --primary-dark:#8a3e23;
    --primary-light:#c46742;
    --accent:#0096d6;
    --coco:#fbf7ef;
    --bg:#f3f7f3;
    --card:#ffffff;
    --text:#0f2a1d;
    --muted:#6b7a72;
    --border:#dfe7e1;
    --danger:#d83a3a;
    --warning:#e68a00;
    --success:#00A859;
    --radius:10px;
    --shadow:0 2px 10px rgba(0,80,40,.06);
  }
  html,body{ height:100%; -webkit-text-size-adjust:100%; }
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:linear-gradient(180deg,var(--coco),var(--bg));
    color:var(--text); min-height:100vh;
  }
  a{ color:var(--accent); text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; }

  /* LOGIN */
  .login{ position:fixed; inset:0; background:linear-gradient(135deg,#00A859,#007a40); display:flex; align-items:center; justify-content:center; z-index:200; }
  .login.hide{ display:none; }
  .login-box{ background:#fff; padding:32px 28px; border-radius:16px; width:340px; max-width:92vw; box-shadow:0 20px 60px rgba(0,0,0,.25); text-align:center; }
  .login-logo{ font-size:42px; }
  .login-box h1{ font-size:20px; margin:8px 0 4px; color:var(--primary-dark); }
  .login-box p{ font-size:12px; color:var(--muted); margin-bottom:18px; }
  .login-box input{ width:100%; padding:12px 14px; border:2px solid var(--border); border-radius:10px; font-size:15px; text-align:center; letter-spacing:.18em; outline:none; }
  .login-box input:focus{ border-color:var(--primary); }
  .login-box button{ margin-top:12px; width:100%; padding:12px; background:var(--primary); color:#fff; border:0; border-radius:10px; font-weight:700; font-size:14px; }
  .login-box button:hover{ background:var(--primary-dark); }
  .login-err{ color:var(--danger); font-size:12px; margin-top:8px; min-height:16px; }

  /* APP LAYOUT */
  .app{ display:none; }
  .app.show{ display:flex; min-height:100vh; }
  .sidebar{
    width:230px; background:#fff; border-right:1px solid var(--border);
    position:fixed; top:0; left:0; bottom:0; display:flex; flex-direction:column;
    box-shadow:var(--shadow); z-index:50; transition:transform .25s;
  }
  .sidebar-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:49; }
  .sidebar-overlay.show{ display:block; }
  .brand{ padding:18px 18px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .brand-logo{ width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,var(--primary),var(--primary-light)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:16px; flex-shrink:0; }
  .brand h1{ font-size:14px; font-weight:800; }
  .brand .tag{ font-size:10px; color:var(--muted); }
  .nav{ flex:1; overflow-y:auto; padding:10px 8px; }
  .nav button{
    width:100%; text-align:left; padding:11px 12px; margin:2px 0; border:0; background:transparent;
    border-radius:8px; font-size:13px; color:var(--text); display:flex; align-items:center; gap:10px;
    min-height:44px;
  }
  .nav button:hover{ background:var(--coco); }
  .nav button.active{ background:linear-gradient(90deg,rgba(0,168,89,.12),transparent); color:var(--primary-dark); font-weight:700; }
  .nav .ico{ width:22px; text-align:center; flex-shrink:0; }
  .nav .sect{ font-size:10px; text-transform:uppercase; color:var(--muted); padding:12px 12px 4px; letter-spacing:.08em; }
  .sidebar-foot{ padding:10px 12px; border-top:1px solid var(--border); font-size:11px; color:var(--muted); }
  .sidebar-foot button{ margin-top:8px; width:100%; padding:10px; background:#fff0ec; color:var(--danger); border:1px solid #ffd5cb; border-radius:8px; font-weight:700; font-size:12px; min-height:40px; }

  .main{ margin-left:230px; flex:1; padding:22px 26px 60px; max-width:100%; }

  /* MOBILE TOPBAR (admin only) */
  .mobile-topbar{ display:none; background:#fff; border-bottom:1px solid var(--border); padding:10px 14px; position:sticky; top:0; z-index:40; align-items:center; gap:10px; box-shadow:var(--shadow); }
  .hamburger{ background:transparent; border:0; font-size:22px; padding:6px; line-height:1; min-width:40px; min-height:40px; display:flex; align-items:center; justify-content:center; }
  .mobile-brand{ font-weight:800; font-size:14px; color:var(--primary-dark); flex:1; }
  .mobile-brand span{ font-size:10px; color:var(--muted); font-weight:400; }

  /* RESELLER TOPBAR */
  .reseller-topbar{
    display:none; background:linear-gradient(90deg,var(--primary-dark),var(--primary));
    padding:12px 16px; position:fixed; top:0; left:0; right:0; z-index:45;
    align-items:center; justify-content:space-between; gap:10px;
    box-shadow:0 2px 12px rgba(0,80,40,.18);
  }
  .reseller-topbar.show{ display:flex; }
  .reseller-topbar .rtb-brand{ font-weight:800; font-size:15px; color:#fff; display:flex; align-items:center; gap:8px; }
  .reseller-topbar .rtb-brand span{ font-size:11px; font-weight:400; opacity:.8; }
  .reseller-topbar .rtb-user{ font-size:12px; color:rgba(255,255,255,.85); text-align:right; }

  /* DOWNBAR (bottom navigation for reseller) */
  .downbar{
    display:none; position:fixed; bottom:0; left:0; right:0;
    background:#fff; border-top:1px solid var(--border);
    box-shadow:0 -2px 16px rgba(0,80,40,.12);
    z-index:50; padding:0; padding-bottom:env(safe-area-inset-bottom);
  }
  .downbar.show{ display:flex; }
  .downbar-inner{ display:flex; width:100%; }
  .downbar-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:8px 4px 6px; border:0; background:transparent; color:var(--muted);
    font-size:10px; font-weight:600; gap:3px; min-height:58px; transition:color .15s;
    cursor:pointer;
  }
  .downbar-btn .db-ico{ font-size:22px; line-height:1; }
  .downbar-btn.active{ color:var(--primary-dark); }
  .downbar-btn.active .db-ico{ transform:scale(1.1); }
  .downbar-btn:hover{ background:var(--coco); }
  .downbar-btn.db-logout{ color:var(--danger); }

  /* Reseller mode: hide sidebar, use bottom nav */
  .app.reseller-mode .sidebar{ display:none !important; }
  .app.reseller-mode .sidebar-overlay{ display:none !important; }
  .app.reseller-mode .mobile-topbar{ display:none !important; }
  .app.reseller-mode .main{ margin-left:0 !important; padding:62px 14px 76px !important; }

  .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; gap:12px; flex-wrap:wrap; }
  .topbar h2{ font-size:20px; color:var(--primary-dark); }
  .topbar .sub{ font-size:12px; color:var(--muted); }
  .topbar .user-pill{ background:#fff; border:1px solid var(--border); padding:6px 12px; border-radius:999px; font-size:12px; font-weight:600; }

  .grid{ display:grid; gap:14px; }
  .grid-4{ grid-template-columns:repeat(4,1fr); }
  .grid-3{ grid-template-columns:repeat(3,1fr); }
  .grid-2{ grid-template-columns:repeat(2,1fr); }
  @media(max-width:900px){ .grid-4,.grid-3{ grid-template-columns:1fr 1fr; } }
  @media(max-width:600px){ .grid-4,.grid-3,.grid-2{ grid-template-columns:1fr; } }

  .card{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); }
  .card h3{ font-size:13px; color:var(--muted); font-weight:600; margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
  .card .val{ font-size:22px; font-weight:800; color:var(--primary-dark); }
  .card .delta{ font-size:11px; color:var(--muted); margin-top:4px; }

  .section{ background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-top:18px; box-shadow:var(--shadow); }
  .section-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
  .section-head h3{ font-size:15px; color:var(--primary-dark); }
  .section-head .actions{ display:flex; gap:8px; flex-wrap:wrap; }

  .btn{ padding:8px 14px; border-radius:8px; border:0; font-weight:600; font-size:12.5px; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; min-height:38px; }
  .btn-primary{ background:var(--primary); color:#fff; }
  .btn-primary:hover{ background:var(--primary-dark); }
  .btn-ghost{ background:#fff; border:1px solid var(--border); color:var(--text); }
  .btn-ghost:hover{ background:var(--coco); }
  .btn-danger{ background:#fff0ec; color:var(--danger); border:1px solid #ffd5cb; }
  .btn-sm{ padding:5px 10px; font-size:11.5px; min-height:32px; }
  .btn-warning{ background:#fff3dd; color:var(--warning); border:1px solid #ffe0a0; }
  .btn-info{ background:#e0f0fb; color:var(--accent); border:1px solid #b3d5f5; }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ padding:10px 8px; text-align:left; border-bottom:1px solid var(--border); }
  th{ background:var(--coco); font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  tr:hover td{ background:#fafdfa; }
  .text-right{ text-align:right; }
  .text-center{ text-align:center; }
  .muted{ color:var(--muted); }
  .pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:10.5px; font-weight:700; }
  .pill-green{ background:#e0f5e9; color:var(--primary-dark); }
  .pill-red{ background:#fde5e3; color:var(--danger); }
  .pill-amber{ background:#fff3dd; color:var(--warning); }
  .pill-blue{ background:#e0f0fb; color:var(--accent); }
  .pill-purple{ background:#f0e8ff; color:#6b21a8; }

  input,select,textarea{ font-family:inherit; font-size:13px; padding:8px 10px; border:1px solid var(--border); border-radius:7px; background:#fff; outline:none; width:100%; }
  input:focus,select:focus,textarea:focus{ border-color:var(--primary); }
  label{ display:block; font-size:11.5px; color:var(--muted); margin-bottom:4px; font-weight:600; }
  .field{ margin-bottom:10px; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }
  .row > .field{ flex:1; min-width:140px; }

  /* MODAL */
  .modal-bg{ position:fixed; inset:0; background:rgba(15,42,29,.45); display:none; align-items:flex-start; justify-content:center; z-index:150; padding:20px 12px; overflow-y:auto; }
  .modal-bg.show{ display:flex; }
  .modal{ background:#fff; border-radius:14px; max-width:680px; width:100%; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
  .modal h3{ color:var(--primary-dark); margin-bottom:14px; }
  .modal-foot{ display:flex; justify-content:flex-end; gap:8px; margin-top:16px; flex-wrap:wrap; }

  /* TOAST */
  .toast{ position:fixed; bottom:72px; right:16px; left:16px; max-width:360px; margin:0 auto; background:var(--text); color:#fff; padding:12px 18px; border-radius:10px; font-size:13px; z-index:300; opacity:0; transition:opacity .25s; pointer-events:none; text-align:center; }
  .toast.show{ opacity:1; }
  .toast.success{ background:var(--primary); }
  .toast.danger{ background:var(--danger); }

  .empty{ padding:36px; text-align:center; color:var(--muted); font-size:13px; }
  .empty .ico{ font-size:40px; opacity:.5; }

  .order-card,.sale-card{ border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; background:#fff; }
  .order-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
  .order-btns{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .item-line{ display:grid; grid-template-columns:2fr 80px 130px 110px 80px 36px; gap:8px; align-items:center; padding:8px 0; border-bottom:1px dashed var(--border); font-size:12.5px; }
  .item-line > *{ min-width:0; }
  .item-line:last-child{ border-bottom:0; }

  /* PRODUCT PICKER (input penjualan baru) */
  .pp-btn{ width:100%; display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:#fff; cursor:pointer; text-align:left; min-height:54px; }
  .pp-btn:hover{ border-color:var(--primary); }
  .pp-btn .pp-thumb{ width:42px; height:42px; border-radius:6px; background:#f2efe6 center/cover no-repeat; flex:0 0 42px; display:grid; place-items:center; font-size:18px; color:var(--muted); }
  .pp-btn .pp-meta{ flex:1; min-width:0; }
  .pp-btn .pp-nm{ font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pp-btn .pp-sub{ font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pp-btn .pp-arrow{ color:var(--muted); flex:0 0 auto; }
  .pp-modal-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; max-height:60vh; overflow:auto; padding:4px; }
  .pp-card{ display:flex; gap:10px; padding:10px; border:1px solid var(--border); border-radius:10px; background:#fff; cursor:pointer; }
  .pp-card:hover{ border-color:var(--primary); box-shadow:0 2px 10px rgba(0,0,0,.06); }
  .pp-card .pp-img{ width:64px; height:64px; border-radius:8px; background:#f2efe6 center/cover no-repeat; flex:0 0 64px; display:grid; place-items:center; font-size:24px; color:var(--muted); }
  .pp-card .pp-body{ flex:1; min-width:0; }
  .pp-card .pp-name{ font-weight:700; font-size:13.5px; line-height:1.25; }
  .pp-card .pp-stk{ font-size:11.5px; color:var(--muted); margin-top:2px; }
  .pp-card .pp-price{ font-size:13.5px; font-weight:800; color:var(--primary-dark); margin-top:4px; }

  /* STOK GRID */
  .stok-thumb{ width:40px; height:40px; border-radius:6px; background:#f2efe6 center/cover no-repeat; display:inline-grid; place-items:center; color:var(--muted); font-size:18px; vertical-align:middle; margin-right:8px; flex:0 0 40px; }
  .stok-nama-cell{ display:flex; align-items:center; gap:8px; min-width:0; }
  .stok-nama-cell .nm-wrap{ min-width:0; }
  .stok-section-title{ font-weight:800; color:var(--primary-dark); margin:10px 0 6px; font-size:13px; display:flex; align-items:center; gap:8px; }
  .stok-section-title .pill{ font-size:10px; }
  .img-uploader{ display:flex; align-items:center; gap:10px; }
  .img-uploader .preview{ width:80px; height:80px; border-radius:8px; background:#f2efe6 center/cover no-repeat; display:grid; place-items:center; color:var(--muted); font-size:28px; border:1px dashed var(--border); flex:0 0 80px; }

  .stock-item{ display:flex; justify-content:space-between; padding:10px; border:1px solid var(--border); border-radius:8px; margin-bottom:8px; gap:10px; align-items:center; }
  .stock-item .info{ flex:1; }
  .stock-item .name{ font-weight:700; font-size:13.5px; }
  .stock-item .meta{ font-size:11.5px; color:var(--muted); margin-top:2px; }

  details summary{ cursor:pointer; padding:8px 0; font-weight:600; color:var(--primary-dark); }

  /* BACKORDER CARD */
  .bo-card{ border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:10px; background:#fff; }
  .bo-card .bo-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }

  /* RESELLER PROFIT BOX */
  .profit-box{ background:linear-gradient(135deg,#e0f5e9,#f0fff4); border:1px solid #a7d7bc; border-radius:12px; padding:16px; margin-top:14px; }
  .profit-box .pb-title{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; font-weight:700; }
  .profit-box .pb-val{ font-size:26px; font-weight:800; color:var(--primary-dark); margin:4px 0; }
  .profit-box .pb-sub{ font-size:12px; color:var(--muted); }

  /* GOOGLE SHEETS SYNC */
  .gs-guide{ background:#eef6ff; border:1px solid #b3d5f5; border-radius:10px; padding:14px 16px; margin-bottom:14px; font-size:12.5px; line-height:1.7; }
  .gs-guide b{ color:var(--accent); }
  .gs-guide ol{ padding-left:18px; margin-top:6px; }
  .gs-status{ margin-top:10px; font-size:12px; color:var(--muted); }
  .gs-status.aktif{ color:var(--primary-dark); }

  /* TENTANG PAGE */
  .about-card{ background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:14px; box-shadow:var(--shadow); }
  .about-card .ico{ font-size:28px; margin-bottom:8px; }
  .about-card h3{ font-size:15px; color:var(--primary-dark); margin-bottom:8px; }
  .about-card p{ font-size:13px; line-height:1.7; color:var(--text); }
  .about-card .muted{ font-size:12px; }

  /* RESPONSIVE — TABLET */
  @media(max-width:900px){
    .main{ padding:18px 16px 60px; }
    .item-line{ grid-template-columns:1fr 1fr; gap:6px; }
  }

  /* RESPONSIVE — MOBILE */
  @media(max-width:640px){
    .mobile-topbar{ display:flex; }
    .sidebar{ transform:translateX(-100%); width:260px; }
    .sidebar.open{ transform:translateX(0); box-shadow:4px 0 24px rgba(0,0,0,.2); }
    .main{ margin-left:0; padding:14px 12px 70px; }
    .topbar h2{ font-size:17px; }
    .topbar .user-pill{ display:none; }
    .card .val{ font-size:18px; }
    .section{ padding:14px; }
    table{ font-size:12px; }
    th,td{ padding:7px 5px; }
    .btn{ min-height:42px; }
    .modal{ padding:16px; margin:0; border-radius:12px; }
    .modal-foot{ gap:6px; }
    .modal-foot .btn{ flex:1; justify-content:center; }
    .row > .field{ min-width:100%; }
    .item-line{ grid-template-columns:1fr 1fr; gap:6px; }
    .gs-guide ol li{ margin-bottom:4px; }
    .about-card{ padding:16px; }
  }

  @media(max-width:400px){
    .grid-2{ grid-template-columns:1fr; }
    .section-head{ flex-direction:column; align-items:flex-start; }
    .topbar{ flex-direction:column; align-items:flex-start; gap:6px; }
  }

  /* ════════════════════════════════════════════════
     v14.0 LOVABLE TRIAGE THEME OVERRIDES
     ════════════════════════════════════════════════ */
  :root{
    --primary:#6366F1;
    --primary-dark:#4338CA;
    --primary-light:#818CF8;
    --accent:#0EA5E9;
    --coco:#F9FAFB;
    --bg:#F7F8FA;
    --card:#FFFFFF;
    --text:#0F172A;
    --muted:#64748B;
    --border:#E5E7EB;
    --danger:#EF4444;
    --warning:#F59E0B;
    --success:#10B981;
    --radius:12px;
    --shadow:0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.04);
    --sidebar-bg:#0B0D12;
    --sidebar-fg:#E5E7EB;
    --sidebar-muted:#94A3B8;
    --sidebar-active:rgba(99,102,241,.18);
  }
  body{ background:var(--bg) !important; font-family:'Inter',system-ui,-apple-system,sans-serif; }
  .login{ background:linear-gradient(135deg,#1E1B4B,#312E81 60%,#0B0D12) !important; }
  .login-box{ border-radius:18px; }
  .login-box h1{ color:var(--primary-dark); }

  /* Sidebar dark triage style */
  .sidebar{ background:var(--sidebar-bg) !important; border-right:1px solid #1F2937 !important; color:var(--sidebar-fg); }
  .brand{ border-bottom:1px solid #1F2937 !important; }
  .brand h1{ color:#fff; }
  .brand .tag{ color:var(--sidebar-muted); }
  .brand-logo{ background:linear-gradient(135deg,var(--primary),var(--primary-light)) !important; box-shadow:0 4px 14px rgba(99,102,241,.45); }
  .nav button{ color:var(--sidebar-fg); position:relative; }
  .nav button:hover{ background:rgba(255,255,255,.05) !important; }
  .nav button.active{ background:var(--sidebar-active) !important; color:#fff !important; font-weight:700; }
  .nav button.active::before{ content:""; position:absolute; left:0; top:6px; bottom:6px; width:3px; border-radius:0 3px 3px 0; background:var(--primary); }
  .nav .sect{ color:var(--sidebar-muted); }
  .sidebar-foot{ border-top:1px solid #1F2937 !important; color:var(--sidebar-muted); }
  .sidebar-foot button{ background:rgba(239,68,68,.12); color:#FCA5A5; border-color:rgba(239,68,68,.25); }

  /* Topbar — chips, status */
  .topbar h2{ color:var(--text); font-weight:700; letter-spacing:-.01em; }
  .topbar .sub{ color:var(--muted); }
  .gs-chip{ display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--border); padding:6px 10px; border-radius:999px; font-size:11.5px; font-weight:600; color:var(--muted); cursor:pointer; user-select:none; }
  .gs-chip .dot{ width:8px; height:8px; border-radius:50%; background:#CBD5E1; box-shadow:0 0 0 3px rgba(203,213,225,.25); }
  .gs-chip.on{ color:#065F46; border-color:#A7F3D0; }
  .gs-chip.on .dot{ background:var(--success); box-shadow:0 0 0 3px rgba(16,185,129,.18); }
  .gs-chip.off{ color:#991B1B; border-color:#FECACA; }
  .gs-chip.off .dot{ background:var(--danger); box-shadow:0 0 0 3px rgba(239,68,68,.18); }
  .gs-chip.idle{ color:#475569; }

  /* Cards & sections */
  .card{ border-radius:14px; }
  .card h3{ color:var(--muted); font-weight:600; }
  .card .val{ color:var(--text); }
  .section{ border-radius:14px; }
  .section-head h3{ color:var(--text); font-weight:700; }
  th{ background:#F8FAFC !important; color:#475569 !important; }
  tr:hover td{ background:rgba(99,102,241,.04) !important; }

  /* Buttons */
  .btn-primary{ background:var(--primary); }
  .btn-primary:hover{ background:var(--primary-dark); }
  .btn-ghost:hover{ background:#F1F5F9; }
  .pill-green{ background:#D1FAE5; color:#065F46; }
  .pill-red{ background:#FEE2E2; color:#991B1B; }
  .pill-amber{ background:#FEF3C7; color:#92400E; }
  .pill-blue{ background:#DBEAFE; color:#1E40AF; }
  .pill-purple{ background:#EDE9FE; color:#5B21B6; }

  /* Mobile topbar restyle */
  .mobile-topbar{ background:#fff; }
  .mobile-brand{ color:var(--text); }
  .mobile-brand span{ color:var(--muted); }

  /* ════════ ARUS KAS ════════ */
  .ak-toolbar{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; align-items:center; }
  .ak-toolbar select, .ak-toolbar input{ width:auto; min-width:140px; }
  .ak-summary{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:14px; }
  @media(max-width:640px){ .ak-summary{ grid-template-columns:1fr; } }
  .ak-summary .card .val{ font-size:20px; }
  .ak-warning-banner{ background:#FEF2F2; border:1px solid #FECACA; color:#991B1B; padding:12px 14px; border-radius:12px; margin-bottom:12px; font-size:13px; font-weight:600; display:flex; gap:10px; align-items:center; }
  .ak-table{ width:100%; border-collapse:separate; border-spacing:0; font-size:13px; background:#fff; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .ak-table th{ background:#F8FAFC; color:#475569; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.05em; padding:11px 10px; border-bottom:1px solid var(--border); text-align:left; }
  .ak-table td{ padding:11px 10px; border-bottom:1px solid #F1F5F9; vertical-align:top; }
  .ak-table tr:last-child td{ border-bottom:0; }
  .ak-table tr.sus td{ background:#FEF2F2; }
  .ak-table tr:hover td{ background:rgba(99,102,241,.05); }
  .ak-table tr.sus:hover td{ background:#FEE2E2; }
  .ak-table .col-no{ width:42px; color:var(--muted); }
  .ak-table .col-num{ text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
  .ak-table .keluar{ color:#B91C1C; font-weight:600; }
  .ak-table .masuk{ color:#047857; font-weight:600; }
  .ak-table .saldo-neg{ color:#B91C1C; }
  .ak-table .saldo-pos{ color:#065F46; }
  .ak-jenis{ display:inline-block; padding:3px 9px; border-radius:6px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
  .ak-jenis-penjualan{ background:#D1FAE5; color:#065F46; }
  .ak-jenis-stok{ background:#FEE2E2; color:#991B1B; }
  .ak-jenis-cicilan{ background:#DBEAFE; color:#1E40AF; }
  .ak-jenis-pengeluaran{ background:#FEF3C7; color:#92400E; }
  .ak-jenis-hutang{ background:#EDE9FE; color:#5B21B6; }
  .ak-jenis-piutang{ background:#FCE7F3; color:#9D174D; }
  .ak-jenis-setoran{ background:#E0E7FF; color:#3730A3; }
  .ak-jenis-lainnya{ background:#F1F5F9; color:#475569; }
  .ak-sus-badge{ display:inline-block; margin-left:6px; background:#FEE2E2; color:#991B1B; padding:2px 6px; border-radius:5px; font-size:10px; font-weight:700; cursor:help; }
  .ak-edited{ color:var(--muted); font-size:10.5px; margin-left:4px; }
  .ak-foot{ font-weight:700; background:#F8FAFC; }
  .ak-empty{ padding:40px 16px; text-align:center; color:var(--muted); }

/* Dashboard quick uplift: make standard .card stat-style on dashboard */
.grid-4 > .card{ border-radius:12px; padding:18px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
.grid-4 > .card h3{ text-transform:none; font-size:13.5px; color:#3d3d3d; font-weight:500; letter-spacing:0; margin-bottom:8px; }
.grid-4 > .card .val{ font-size:30px; color:#0f2a1d; line-height:1.1; }
.grid-4 > .card .delta{ font-size:12px; margin-top:6px; }

/* ═══════════════ MOTUBU TOP-NAV OVERRIDE ═══════════════ */
.app.show{ flex-direction:column; min-height:100vh; }
.sidebar, .sidebar-overlay, .mobile-topbar{ display:none !important; }
.app.reseller-mode .motubu-header, .app.reseller-mode .motubu-tabs{ display:none !important; }

.motubu-header{
  background:linear-gradient(180deg,#a04a2c,#8a3e23);
  color:#fff; padding:10px 22px; display:flex; align-items:center; gap:18px;
  position:sticky; top:0; z-index:60; box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.motubu-brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:17px; letter-spacing:.04em; white-space:nowrap; }
.motubu-brand .mb-ico{ font-size:20px; }
.motubu-search{
  flex:1; max-width:640px; position:relative;
}
.motubu-search input{
  width:100%; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.22);
  color:#fff; border-radius:8px; padding:8px 12px 8px 34px; font-size:13px; outline:none;
}
.motubu-search input::placeholder{ color:rgba(255,255,255,.7); }
.motubu-search input:focus{ background:rgba(255,255,255,.22); border-color:rgba(255,255,255,.45); }
.motubu-search::before{ content:"🔍"; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:12px; opacity:.85; }
.motubu-actions{ display:flex; gap:8px; align-items:center; margin-left:auto; }
.motubu-pill{
  background:#fff; color:#5a2a18; border:0; padding:6px 14px; border-radius:8px;
  font-weight:700; font-size:12.5px; display:inline-flex; align-items:center; gap:6px;
}
.motubu-logout{
  background:transparent; color:#fff; border:1px solid rgba(255,255,255,.3);
  padding:6px 14px; border-radius:8px; font-weight:700; font-size:12.5px; cursor:pointer;
  display:inline-flex; align-items:center; gap:6px;
}
.motubu-logout:hover{ background:rgba(255,255,255,.14); }

.motubu-tabs{
  background:#fff; border-bottom:1px solid var(--border);
  display:flex; gap:0; padding:0 18px; overflow-x:auto; position:sticky; top:48px; z-index:55;
  box-shadow:0 1px 0 rgba(0,0,0,.02);
}
.motubu-tabs::-webkit-scrollbar{ height:0; }
.motubu-tabs button{
  background:transparent; border:0; padding:14px 16px 12px;
  font-size:13.5px; color:#3d3d3d; font-weight:500; white-space:nowrap;
  border-bottom:3px solid transparent; margin-bottom:-1px; cursor:pointer;
}
.motubu-tabs button:hover{ color:#a04a2c; }
.motubu-tabs button.active{ color:#a04a2c; font-weight:700; border-bottom-color:#a04a2c; }

.main{ margin-left:0 !important; padding:22px 26px 60px !important; }
@media(max-width:640px){
  .motubu-header{ padding:8px 12px; gap:8px; }
  .motubu-brand{ font-size:14px; }
  .motubu-search{ display:none; }
  .motubu-pill .lbl, .motubu-logout .lbl{ display:none; }
  .motubu-tabs{ padding:0 8px; top:46px; }
  .motubu-tabs button{ padding:12px 10px 10px; font-size:12.5px; }
  .main{ padding:14px 12px 70px !important; }
}

/* Dashboard cards — MOTUBU style with icon badge */
.mtb-stat-card{
  background:#fff; border:1px solid var(--border); border-radius:12px;
  padding:18px 18px 16px; box-shadow:0 1px 3px rgba(0,0,0,.04);
  display:flex; flex-direction:column; gap:6px; position:relative;
}
.mtb-stat-card .mtb-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
.mtb-stat-card .mtb-label{ font-size:13px; color:#3d3d3d; font-weight:500; }
.mtb-stat-card .mtb-badge{
  width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;
}
.mtb-stat-card .mtb-val{ font-size:30px; font-weight:800; color:#0f2a1d; margin-top:6px; line-height:1.1; }
.mtb-stat-card .mtb-sub{ font-size:12px; color:var(--muted); margin-top:2px; }
.mtb-badge-blue{ background:#e7f0fb; color:#1f6fcc; }
.mtb-badge-green{ background:#e2f5ea; color:#1f9e5a; }
.mtb-badge-red{ background:#fde7e6; color:#cb3a36; }
.mtb-badge-amber{ background:#fdefd6; color:#cf8a10; }

/* Sync status enhanced */
.gs-status.err{ color:var(--danger); }
.gs-status .gs-err-detail{ display:block; margin-top:4px; font-size:11.5px; color:var(--danger); }

      headers: Object.assign({}, SB_HEADERS, {'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify([row])
    });
    window._gsStatus='on'; if(typeof renderGSChip==='function') renderGSChip();
  }catch(e){ console.warn('auto push gagal', e); window._gsStatus='off'; if(typeof renderGSChip==='function') renderGSChip(); }
}
function sbSchedulePush(storageKey){
  if(!storageKey) return;
  if(storageKey==='bld_gsconfig' || storageKey==='bld_auth_v13') return;
  if(window._sbSyncing) return; // jangan push saat sedang pull (mencegah loop)
  clearTimeout(window._sbPushTimers[storageKey]);
  window._sbPushTimers[storageKey] = setTimeout(()=>sbPushKey(storageKey), 500);
}
async function sbFlushPendingPushes(){
  const keys=Object.keys(window._sbPushTimers||{});
  for(const k of keys){
    const t=window._sbPushTimers[k];
    if(t){ clearTimeout(t); delete window._sbPushTimers[k]; try{ await sbPushKey(k); }catch(e){} }
  }
}
async function sbAutoPull(silent){
  // Hindari race: pastikan semua perubahan lokal sudah ter-push sebelum pull menimpa
  await sbFlushPendingPushes();
  // ⛔ Jangan pull saat modal terbuka / sedang upload foto — kalau dipaksa pull lalu re-render,
  //    field input di modal (mis. qty) bisa "hilang" karena re-render mengganti DOM
  const modalOpenNow = document.getElementById('modal-bg')?.classList.contains('show');
  if(modalOpenNow || window._uploadingPhoto){ return false; }
  try{
    window._sbSyncing = true;
    const res = await fetch(SUPABASE_URL+'/rest/v1/'+SB_TABLE+'?select=key,value,updated_at', { headers: SB_HEADERS, cache:'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const rows = await res.json();
    const data={}; rows.forEach(r=>{ data[r.key]=r.value; });
    let changed=false;
    Object.keys(K).forEach(k=>{
      if(k==='gsConfig') return;
      const sheetKey = K[k].replace('bld_','');
      if(data[sheetKey] !== undefined){
        const incoming = JSON.stringify(data[sheetKey]);
        const local = localStorage.getItem(K[k]) || '';
        if(incoming !== local){
          localStorage.setItem(K[k], incoming);
          changed=true;
        }
      }
    });
    window._gsStatus='on'; if(typeof renderGSChip==='function') renderGSChip();
    if(changed && !silent && typeof renderView==='function'){ try{ renderView(); }catch(e){} }
    return changed;
  }catch(e){
    console.warn('auto pull gagal', e);
    window._gsStatus='off'; if(typeof renderGSChip==='function') renderGSChip();
    return false;
  }finally{
    window._sbSyncing = false;
  }
}
function sbStartAutoSync(){
  if(window._sbAutoStarted) return;
  window._sbAutoStarted = true;
  // pull ulang saat tab kembali aktif
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) sbAutoPull(false); });
  window.addEventListener('focus', ()=>sbAutoPull(false));
  // polling cadangan tiap 60 detik (jaga-jaga kalau realtime putus)
  setInterval(()=>{ if(!document.hidden) sbAutoPull(false); }, 60000);
  // === REALTIME via Supabase channel ===
  try{
    if(window.supabase && window.supabase.createClient){
      const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth:{ persistSession:false, autoRefreshToken:false },
        realtime:{ params:{ eventsPerSecond: 5 } }
      });
      window._sbClient = client;
      const applyRow = (row)=>{
        if(!row || !row.key) return;
        // ⛔ Jangan re-render kalau modal terbuka / lagi upload foto
        const modalOpen = document.getElementById('modal-bg')?.classList.contains('show');
        if(modalOpen || window._uploadingPhoto){
          // tetap update localStorage, tapi tunda render sampai modal tertutup
          let changedSilent = false;
          Object.keys(K).forEach(k=>{
            if(k==='gsConfig') return;
            const sheetKey = K[k].replace('bld_','');
            if(sheetKey === row.key){
              const incoming = JSON.stringify(row.value);
              const local = localStorage.getItem(K[k]) || '';
              if(incoming !== local){ localStorage.setItem(K[k], incoming); changedSilent = true; }
            }
          });
          if(changedSilent) window._pendingRerender = true;
          return;
        }
        let changed = false;
        Object.keys(K).forEach(k=>{
          if(k==='gsConfig') return;
          const sheetKey = K[k].replace('bld_','');
          if(sheetKey === row.key){
            const incoming = JSON.stringify(row.value);
            const local = localStorage.getItem(K[k]) || '';
            if(incoming !== local){
              localStorage.setItem(K[k], incoming);
              changed = true;
            }
          }
        });
        if(changed && typeof renderView==='function'){ try{ renderView(); }catch(e){} }
      };
      const channel = client.channel('app_data_changes')
        .on('postgres_changes', { event:'*', schema:'public', table: SB_TABLE }, (payload)=>{
          if(window._sbSyncing) return; // jangan loop dengan push lokal
          const row = payload.new || payload.old;
          applyRow(row);
          window._gsStatus='on'; if(typeof renderGSChip==='function') renderGSChip();
        })
        .subscribe((status)=>{
          if(status==='SUBSCRIBED'){
            window._sbRealtime = true;
            window._gsStatus='on'; if(typeof renderGSChip==='function') renderGSChip();
          } else if(status==='CHANNEL_ERROR' || status==='TIMED_OUT' || status==='CLOSED'){
            window._sbRealtime = false;
          }
        });
      window._sbChannel = channel;
    }
  }catch(e){ console.warn('realtime gagal start', e); }
}
function fmtRp(n){ n=Math.round(n||0); return 'Rp'+n.toLocaleString('id-ID'); }
function fmtDate(d){ if(!d) return '-'; const dt=new Date(d); return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(d){ if(!d) return '-'; return new Date(d).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

function captureFocus(){
  const ae=document.activeElement;
  if(!ae||!ae.id) return null;
  let sel=null;
  try{ if('selectionStart' in ae) sel=[ae.selectionStart, ae.selectionEnd]; }catch(e){}
  return {id:ae.id, sel};
}
function restoreFocus(snap){
  if(!snap) return;
  const el=document.getElementById(snap.id);
  if(!el) return;
  try{
    el.focus();
    if(snap.sel && 'setSelectionRange' in el){ el.setSelectionRange(snap.sel[0], snap.sel[1]); }
  }catch(e){}
}
function rerender(fn){ const s=captureFocus(); fn(); restoreFocus(s); }

/* ════════════════════════════════════════════════
   RUMUS BISNIS
   ════════════════════════════════════════════════ */
function roundHargaBeli(h){ h=Math.max(0,h||0); const s=h%1000; return s>=500?(h-s+1000):(h-s); }
function suggestPrice(hpp){
  const h=Math.max(0,hpp||0);
  if(h<=0) return 0;
  const cfg=getSettings();
  const m=getMarginInfo(h);
  const omzet=+cfg.omzetBulanan||0;
  let bebanPct = omzet>0 ? ((+cfg.opexBulanan||0)+(+cfg.cicilanBulanan||0))/omzet : 0;
  const feePct = (+cfg.bankFeePct||0)/100;
  const labaPct = Math.max(0,(+cfg.labaPct||0))/100;
  const tierMul = m.tier==='murah' ? (+cfg.tierMurahMul||1)
                : m.tier==='mahal' ? (+cfg.tierMahalMul||1)
                : (+cfg.tierSedangMul||1);
  let totalPct = (bebanPct + feePct + labaPct) * tierMul;
  if(totalPct >= 0.85) totalPct = 0.85;
  if(totalPct < 0) totalPct = 0;
  let harga;
  if(omzet>0){
    harga = h / (1 - totalPct);
  } else {
    harga = h + (m.markup * tierMul);
  }
  return Math.ceil(harga/1000)*1000;
}
function getMarginInfo(hb){
  const r=roundHargaBeli(hb);
  if(r<30000)  return {tier:'murah',  markup:2000, label:'+Rp2.000'};
  if(r<=100000)return {tier:'sedang', markup:3000, label:'+Rp3.000'};
  return              {tier:'mahal',  markup:5000, label:'+Rp5.000'};
}
function hitungHppProporsional(order){
  const items=order.items||[];
  const totalBeli=items.reduce((s,i)=>s+(i.hargaBeli||0)*(i.qty||0),0);
  const biayaTambahan=(order.totalBiaya||0)-totalBeli;
  return items.map(it=>{
    const beliItem=(it.hargaBeli||0)*(it.qty||0);
    const porsi=totalBeli>0?beliItem/totalBeli:(items.length?1/items.length:0);
    const biayaPerPcs=it.qty>0?Math.round(biayaTambahan*porsi/it.qty):0;
    return Math.max(0,(it.hargaBeli||0)+biayaPerPcs);
  });
}

  host.innerHTML = `

function saveOrder(){
  const o=_draftOrder;

function terimaOrder(id){
  const list=load(K.orders);
  const o=list.find(x=>x.id===id);
  if(!o) return;
  if(o.status==='received'){ toast('Order sudah diterima'); return; }
  if(!confirm('Konfirmasi: barang sudah sampai? Stok akan otomatis diperbarui.')) return;
  const hppList=hitungHppProporsional(o);
  const stock=load(K.stock);
  o.items.forEach((it,idx)=>{
    const hpp=hppList[idx];
    const key=normKey(it.nama, it.varian);
    let prod=stock.find(p=>p.key===key);
    if(prod){
      const oldQty=prod.qty||0; const newQty=oldQty+it.qty;
      prod.hargaBeli = Math.round((oldQty*(prod.hargaBeli||0) + it.qty*(it.hargaBeli||0)) / newQty);
      prod.hpp       = Math.round((oldQty*(prod.hpp||0) + it.qty*hpp) / newQty);
      prod.qty       = newQty;
      prod.lastRestock = Date.now();
      if(!prod.hargaJual) prod.hargaJual = suggestPrice(prod.hpp);
    } else {
      const hb=it.hargaBeli||0;
      stock.push({id:uid(), key, nama:it.nama.trim(), varian:(it.varian||'').trim(), qty:it.qty, hargaBeli:hb, hpp, hargaJual:suggestPrice(hpp), firstStock:Date.now(), lastRestock:Date.now(), sourceOrderId:o.id});
    }
  });
  o.status='received'; o.tanggalTerima=Date.now();
  save(K.orders, list); save(K.stock, stock);
  logActivity('order','stok',`Order diterima → ${o.items.length} produk masuk stok`, o.id);
  toast('Stok diperbarui','success'); renderView();
}
function normKey(nama, varian){ return ((nama||'')+'|'+(varian||'')).toLowerCase().replace(/\s+/g,' ').trim(); }

function getSalesCountByProduct(){
  if(window._salesCountCache && (Date.now()-window._salesCountCacheAt<5000)) return window._salesCountCache;
  const map={};
  load(K.sales).forEach(s=>{
    (s.items||[]).forEach(it=>{
      const id=it.prodId||it.id; if(!id) return;
      map[id]=(map[id]||0)+(+it.qty||0);
    });
  });
  window._salesCountCache=map; window._salesCountCacheAt=Date.now();
  return map;
}
function bestSellerBadge(pid, counts){
  const n=counts[pid]||0;
  if(!n) return '';
  const max=Math.max(...Object.values(counts), 0);
  const isTop = n>=5 && n===max;
  const cls = isTop ? 'pill-amber' : 'pill-green';
  const icon = isTop ? '🔥 ' : '';
  return ` <span class="pill ${cls}" style="font-size:10px" title="Total terjual">${icon}${n}× terjual</span>`;
}

const SB_BUCKET='produk';
async function uploadToBucket(blob, ext){
  const path = 'p-'+Date.now()+'-'+Math.random().toString(36).slice(2,8)+'.'+(ext||'jpg');
  const url  = SUPABASE_URL+'/storage/v1/object/'+SB_BUCKET+'/'+path;
  const res = await fetch(url, {
    method:'POST',
    headers:{ 'apikey':SUPABASE_ANON_KEY, 'Authorization':'Bearer '+SUPABASE_ANON_KEY, 'Content-Type': blob.type||'image/jpeg', 'x-upsert':'true' },
    body: blob
  });
  if(!res.ok){ throw new Error('Upload gagal: HTTP '+res.status); }
  return SUPABASE_URL+'/storage/v1/object/public/'+SB_BUCKET+'/'+path;
}
function onPickStockImg(inp){
  const f=inp.files&&inp.files[0]; if(!f) return;
  if(f.size>5000000){ toast('Gambar terlalu besar (maks ~5MB)','danger'); inp.value=''; return; }
  // Tandai sedang upload — disable tombol Simpan & skip auto-pull supaya field qty/nama tidak hilang
  window._uploadingPhoto = true;
  const saveBtn = document.querySelector('#modal .modal-foot .btn-primary');
  const originalSaveLabel = saveBtn ? saveBtn.textContent : '';
  if(saveBtn){ saveBtn.disabled = true; saveBtn.textContent = '⏳ Mengunggah foto…'; }
  const img=new Image();
  const reader=new FileReader();
  reader.onload=()=>{
    img.onload=async ()=>{
      // resize to max 800px untuk efisiensi
      const max=800; let w=img.width, h=img.height;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const prev=document.getElementById('p-img-prev');
      // tampilkan preview lokal dulu
      const localDataUrl = c.toDataURL('image/jpeg', 0.82);
      if(prev){ prev.style.backgroundImage=`url('${localDataUrl}')`; prev.textContent=''; }
      // upload ke bucket Supabase
      try{
        const blob = await new Promise(r=>c.toBlob(r, 'image/jpeg', 0.82));
        const publicUrl = await uploadToBucket(blob, 'jpg');
        _editStockImg = publicUrl;
        toast('Foto terunggah ke cloud ✓','success');
      }catch(e){
        console.warn('Upload bucket gagal, pakai data URL:', e);
        _editStockImg = localDataUrl;
        toast('Upload bucket gagal — disimpan lokal saja. Cek bucket "produk" sudah dibuat & public.','danger');
      }
      // Selesai upload — aktifkan tombol Simpan
      window._uploadingPhoto = false;
      if(saveBtn){ saveBtn.disabled = false; saveBtn.textContent = originalSaveLabel || 'Simpan'; }
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(f);
}
function clearStockImg(){
  _editStockImg='';
  const prev=document.getElementById('p-img-prev');
  if(prev){ prev.style.backgroundImage=''; prev.textContent='📦'; }
  const inp=document.getElementById('p-img'); if(inp) inp.value='';
}
function suggestStockPrice(){
  const hb=+val('p-hb')||0; let hpp=+val('p-hpp')||0; if(!hpp) hpp=hb;
  const sug=suggestPrice(hpp); const info=getMarginInfo(hb);
  const el=document.getElementById('p-info');
  if(el) el.innerHTML=`Sugesti harga jual: <b>${fmtRp(sug)}</b> · Tier: ${info.tier} (${info.label})`;
}
function applySuggest(){
  const hb=+val('p-hb')||0; let hpp=+val('p-hpp')||0; if(!hpp) hpp=hb;
  const el=document.getElementById('p-hj'); if(el) el.value=suggestPrice(hpp);
}
function saveStock(pid, isNew){
  const stock=load(K.stock);
  const data={id:pid, nama:val('p-nama').trim(), varian:val('p-var').trim(), qty:+val('p-qty')||0, hargaBeli:+val('p-hb')||0, hpp:+val('p-hpp')||0, hargaJual:+val('p-hj')||0, img:_editStockImg||'', tanggalOrder: (val('p-tord')? new Date(val('p-tord')).getTime() : 0), grupOrder: val('p-gord').trim()};
  data.key=normKey(data.nama, data.varian);
  if(!data.nama){ toast('Nama produk wajib','danger'); return; }
  if(!data.hpp) data.hpp=data.hargaBeli;
  if(!data.hargaJual) data.hargaJual=suggestPrice(data.hpp);
  const idx=stock.findIndex(x=>x.id===pid);
  if(idx>=0){ Object.assign(stock[idx], data); } else { data.firstStock=Date.now(); data.lastRestock=Date.now(); stock.push(data); }
  save(K.stock, stock);
  logActivity('stok','stok',(isNew?'Tambah':'Edit')+' produk stok: '+data.nama, pid);
  closeModal(); toast('Stok disimpan','success'); renderView();
}
function delStock(id){
  if(!confirm('Hapus produk stok ini?')) return;
  save(K.stock, load(K.stock).filter(x=>x.id!==id));
  logActivity('stok','stok','Hapus produk');
  renderView();
}

          <div class="row" style="margin-top:6px">

function previewRestockItem(it, r){
  const subtotal = r.items.reduce((s,i2)=>s+(i2.qty||0)*(i2.hargaBeli||0),0);
  const totalAdj = adjTotal(r.adjustments);
  const sub=(it.qty||0)*(it.hargaBeli||0);
  const porsi = subtotal>0 ? sub/subtotal : 1/Math.max(r.items.length,1);
  const adjPerPcs = it.qty>0 ? Math.round(totalAdj*porsi/it.qty) : 0;
  const hppMasuk = Math.max(0,(it.hargaBeli||0) + adjPerPcs);
  let merge=null;
  if(it.mode==='existing' && it.prodId){
    const p=load(K.stock).find(x=>x.id===it.prodId);
    if(p){
      const oldQty=p.qty||0; const newQty=oldQty+(it.qty||0);
      const hppBaru = newQty>0 ? Math.round((oldQty*(p.hpp||0)+(it.qty||0)*hppMasuk)/newQty) : hppMasuk;
      merge={hppBaru, newQty};
    }
  }
  return {adjPerPcs, hppMasuk, merge};
}
function setRestockMode(i,mode){ _draftRestock.items[i].mode=mode; _draftRestock.items[i].prodId=''; renderRestockModal(); }
function setRestockProd(i,pid){
  _draftRestock.items[i].prodId=pid;
  if(pid){ const p=load(K.stock).find(x=>x.id===pid); if(p && !_draftRestock.items[i].hargaBeli) _draftRestock.items[i].hargaBeli=p.hargaBeli||0; }
  renderRestockModal();
}
function updRestockTxt(i,f,v){ _draftRestock.items[i][f]=v; }
function updRestockNum(i,f,v){ _draftRestock.items[i][f]=v; rerender(renderRestockModal); }
function addRestockItem(){
  const last=_draftRestock.items[_draftRestock.items.length-1];
  const it=blankRestockItem();
  if(last){ if(last.mode==='new' && (last.nama||'').trim()){ it.mode='new'; it.nama=(last.nama||'').trim(); } }
  _draftRestock.items.push(it);
  renderRestockModal();
}
function rmRestockItem(i){ _draftRestock.items.splice(i,1); if(_draftRestock.items.length===0)_draftRestock.items.push(blankRestockItem()); renderRestockModal(); }
function saveRestock(){
  const r=_draftRestock;
  const items = r.items.filter(it=>{ if(it.mode==='existing') return it.prodId && it.qty>0; return (it.nama||'').trim() && it.qty>0; });
  if(items.length===0){ toast('Tambahkan minimal 1 produk valid','danger'); return; }
  r.adjustments=(r.adjustments||[]).filter(a=>(+a.amount||0)>0);
  const subtotal = items.reduce((s,i)=>s+(i.qty||0)*(i.hargaBeli||0),0);
  const totalAdj = adjTotal(r.adjustments);
  const stock = load(K.stock);
  items.forEach(it=>{
    const sub=(it.qty||0)*(it.hargaBeli||0);
    const porsi = subtotal>0 ? sub/subtotal : 1/items.length;
    const adjPerPcs = it.qty>0 ? Math.round(totalAdj*porsi/it.qty) : 0;
    const hppMasuk = Math.max(0,(it.hargaBeli||0) + adjPerPcs);
    if(it.mode==='existing'){
      const p=stock.find(x=>x.id===it.prodId); if(!p) return;
      const oldQty=p.qty||0; const newQty=oldQty+(it.qty||0);
      p.hargaBeli = newQty>0 ? Math.round((oldQty*(p.hargaBeli||0)+(it.qty||0)*(it.hargaBeli||0))/newQty) : (it.hargaBeli||0);
      p.hpp = newQty>0 ? Math.round((oldQty*(p.hpp||0)+(it.qty||0)*hppMasuk)/newQty) : hppMasuk;
      p.qty = newQty; p.lastRestock = r.tanggal||Date.now();
      if(!p.hargaJual) p.hargaJual = suggestPrice(p.hpp);
    } else {
      const nama=(it.nama||'').trim(); const varian=(it.varian||'').trim();
      const key=normKey(nama,varian); const existing=stock.find(p=>p.key===key);
      if(existing){
        const oldQty=existing.qty||0; const newQty=oldQty+(it.qty||0);
        existing.hargaBeli = newQty>0 ? Math.round((oldQty*(existing.hargaBeli||0)+(it.qty||0)*(it.hargaBeli||0))/newQty) : (it.hargaBeli||0);
        existing.hpp = newQty>0 ? Math.round((oldQty*(existing.hpp||0)+(it.qty||0)*hppMasuk)/newQty) : hppMasuk;
        existing.qty = newQty; existing.lastRestock = r.tanggal||Date.now();
        if(!existing.hargaJual) existing.hargaJual = suggestPrice(existing.hpp);
      } else {
        stock.push({id:uid(), key, nama, varian, qty:it.qty||0, hargaBeli:it.hargaBeli||0, hpp:hppMasuk, hargaJual:suggestPrice(hppMasuk), firstStock:Date.now(), lastRestock:r.tanggal||Date.now()});
      }
    }
  });
  save(K.stock, stock);
  // ⬇️ Catat juga sebagai order received agar muncul di Arus Kas (keluar)
  const orderItems = items.map(it=>({
    nama: it.mode==='existing' ? ((stock.find(p=>p.id===it.prodId)||{}).nama || '') : (it.nama||'').trim(),
    varian: it.mode==='existing' ? ((stock.find(p=>p.id===it.prodId)||{}).varian || '') : (it.varian||'').trim(),
    qty: it.qty||0,
    hargaBeli: it.hargaBeli||0,
  }));
  const orders = load(K.orders);
  orders.push({
    id: uid(),
    supplierId: null,
    supplierNama: 'Restock manual',
    tanggal: r.tanggal || Date.now(),
    tanggalTerima: r.tanggal || Date.now(),
    items: orderItems,
    adjustments: r.adjustments||[],
    totalBiaya: subtotal + totalAdj,
    status: 'received',
    sourceRestock: true,
  });
  save(K.orders, orders);
  logActivity('stok','stok',`Restock ${items.length} produk · total ${fmtRp(subtotal+totalAdj)}`);
  closeModal(); toast('Stok diperbarui (HPP rata-rata) & arus kas dicatat','success'); renderView();
}

      _draftSale.items[i].hargaJualAdmin = p.hargaJual||0;
      _draftSale.items[i].hargaJualReseller = u.role==='reseller'
        ? getResellerPrice(u.id, p.id, p.hargaJual||0)
        : (p.hargaJual||0);
    }
  }
  renderSaleModal();
}
function updSaleNum(i,f,v){ _draftSale.items[i][f]=v; rerender(renderSaleModal); }
function updSaleResellerPrice(i,v){
  _draftSale.items[i].hargaJualReseller=v;
  _draftSale.items[i].hargaJual=v;
  rerender(renderSaleModal);
}
function addSaleItem(){
  const stock=load(K.stock).filter(p=>p.qty>0);
  if(!stock.length) return;

  const p=stock[0];

  _draftSale.items.push({prodId:p.id, qty:1, hargaJualAdmin:p.hargaJual||0, hargaJualReseller:rHJ, hargaJual:rHJ, profitOverride:null});
  renderSaleModal();
}
function rmSaleItem(i){ _draftSale.items.splice(i,1); if(_draftSale.items.length===0){ closeModal(); return; } renderSaleModal(); }
function saveSale(){
  const s=_draftSale;
  const u=currentUser();
  const isEdit=!!s._isEdit;
  const isReseller = u.role==='reseller';
  s.tanggal=new Date(val('sl-tgl')).getTime()||Date.now();
  s.metode=val('sl-met'); s.pelangganNama=val('sl-pn').trim(); s.pelangganKontak=val('sl-pk').trim();
  s.catatan=val('sl-cat').trim();
  if(!isReseller) s.bankFeePct=+val('sl-fee')||0;
  if(s.metode==='cicil'){ s.janjiPelunasan=val('sl-janji').trim(); if(!s.pelangganNama){ toast('Nama pelanggan wajib untuk cicilan','danger'); return; } }
  const stock=load(K.stock);
  if(isReseller){
    for(const it of s.items){
      const h = +(it.hargaJualReseller||it.hargaJual||0);
      if(h < 1000){ toast('Harga jual user minimal Rp1.000','danger'); return; }
    }
  }
  if(!isEdit){
    for(const it of s.items){
      const p=stock.find(x=>x.id===it.prodId);
      if(!p){ toast('Produk tidak ditemukan','danger'); return; }
      if((p.qty||0)<=0){ toast(`Stok ${p.nama} habis`,'danger'); return; }
      if(it.qty>p.qty){ toast(`Stok ${p.nama} kurang (tersisa ${p.qty})`,'danger'); return; }
    }
  }
  let totalReseller=0, totalAdmin=0, hppT=0;
  s.items.forEach(it=>{
    const p=stock.find(x=>x.id===it.prodId); if(!p) return;
    it.nama=p.nama; it.varian=p.varian; it.hpp=p.hpp;
    if(isReseller){
      it.hargaJualAdmin = p.hargaJual||0;  // reseller: admin price fixed from stock
      it.hargaJualReseller = it.hargaJualReseller||it.hargaJual||p.hargaJual||0;
      it.hargaJual = it.hargaJualReseller;
      setResellerPrice(u.id, p.id, it.hargaJualReseller);
      totalReseller += (it.hargaJualReseller||it.hargaJual||0)*it.qty;
      totalAdmin    += (it.hargaJualAdmin||0)*it.qty;
    } else {
      it.hargaJualAdmin = it.hargaJual||p.hargaJual||0;  // admin: use the edited price
      it.hargaJualReseller = it.hargaJualAdmin;
      totalReseller += (it.hargaJual||0)*it.qty;
      totalAdmin    += (it.hargaJualAdmin||0)*it.qty;
    }
    hppT += (p.hpp||0)*it.qty;
  });
  s.total = isReseller ? totalReseller : totalAdmin;
  s.totalAdmin = totalAdmin;
  s.totalReseller = totalReseller;
  s.hpp = hppT;
  if(isReseller){
    s.bankFee=0;
    s.profit = totalAdmin - hppT; // admin profit stays at admin price - hpp
    s.resellerProfit = totalReseller - totalAdmin;
    s.byResellerId = u.id;
    s.byResellerNama = u.nama;
  } else {
    s.bankFee = Math.round(totalAdmin * (s.bankFeePct||0) / 100);
    const profitInput = val('sl-profit');
    s.profit = (profitInput!=='' && !isNaN(+profitInput)) ? +profitInput : ((totalAdmin-hppT) - s.bankFee);
    s.byResellerId=null; s.byResellerNama=null;
  }
  const cleanSale = Object.assign({}, s);
  delete cleanSale._isEdit; delete cleanSale._origMetode;
  if(!isEdit){
    s.items.forEach(it=>{ const p=stock.find(x=>x.id===it.prodId); if(p) p.qty -= it.qty; });
    save(K.stock, stock);
    const sales=load(K.sales); sales.push(cleanSale); save(K.sales, sales);
  } else {
    const sales=load(K.sales);
    const idx=sales.findIndex(x=>x.id===s.id);
    if(idx>=0) sales[idx]=cleanSale; else sales.push(cleanSale);
    save(K.sales, sales);
  }
  const customers=load(K.customers);
  let preservedPembayaran=[];
  customers.forEach(c=>{ (c.transaksi||[]).forEach(t=>{ if(t.saleId===s.id) preservedPembayaran=t.pembayaran||[]; }); });
  customers.forEach(c=>{ c.transaksi=(c.transaksi||[]).filter(t=>t.saleId!==s.id); });
  if(s.metode==='cicil'){
    let c=customers.find(x=>x.nama.toLowerCase()===s.pelangganNama.toLowerCase());
    if(!c){ c={id:uid(), nama:s.pelangganNama, kontak:s.pelangganKontak, transaksi:[]}; customers.push(c); }
    else if(s.pelangganKontak) c.kontak=s.pelangganKontak;
    c.transaksi.push({ id:uid(), saleId:s.id, tanggal:s.tanggal, total:s.totalAdmin||s.total, janjiPelunasan:s.janjiPelunasan||'', items:cleanSale.items||[], pembayaran:preservedPembayaran });
  }
  save(K.customers, customers);
  logActivity('penjualan','penjualan',`${isEdit?'Edit':'Penjualan'} ${s.metode==='cash'?'cash':'cicil'} — ${fmtRp(s.total)}${s.pelangganNama?' ('+s.pelangganNama+')':''}`, s.id);
  closeModal(); toast(isEdit?'Penjualan diperbarui ✓':'Penjualan tersimpan','success'); renderView();
}

function delSale(id){
  const s=load(K.sales).find(x=>x.id===id); if(!s) return;
  const prodList=(s.items||[]).map(i=>esc(i.nama)+(i.varian?' ('+esc(i.varian)+')':'')+' ×'+i.qty).join(', ');
  openModal(`
    <h3>🗑 Hapus Penjualan</h3>
    <p style="margin-bottom:8px">Penjualan <b>${fmtDate(s.tanggal)}</b> · ${esc(s.pelangganNama||'Umum')} · <b>${fmtRp(s.total)}</b></p>
    <p class="muted" style="font-size:12.5px;margin-bottom:14px">Produk: ${prodList}</p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-ghost" style="justify-content:flex-start;text-align:left;padding:14px 16px" onclick="confirmDelSale('${id}',true)">
        <span style="font-size:18px">↩️</span>
        <span><b>Hapus & Kembalikan Stok</b><br><span class="muted" style="font-size:12px">Qty produk dikembalikan ke stok seperti semula</span></span>
      </button>
      <button class="btn btn-ghost" style="justify-content:flex-start;text-align:left;padding:14px 16px" onclick="confirmDelSale('${id}',false)">
        <span style="font-size:18px">🗑</span>
        <span><b>Hapus Tanpa Kembalikan Stok</b><br><span class="muted" style="font-size:12px">Stok tetap seperti sekarang (tidak berubah)</span></span>
      </button>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
    </div>
  `);
}
function confirmDelSale(id, returnStock){
  const sales=load(K.sales);
  const s=sales.find(x=>x.id===id); if(!s){ closeModal(); return; }
  if(returnStock){
    const stock=load(K.stock);
    (s.items||[]).forEach(it=>{
      const p=stock.find(x=>x.id===it.prodId);
      if(p){ p.qty += (it.qty||0); }
    });
    save(K.stock, stock);
  }
  save(K.sales, sales.filter(x=>x.id!==id));
  const cs=load(K.customers); cs.forEach(c=>{ c.transaksi=(c.transaksi||[]).filter(t=>t.saleId!==id); }); save(K.customers, cs);
  logActivity('penjualan','penjualan','Hapus penjualan'+(returnStock?' (stok dikembalikan)':''));
  closeModal(); toast(returnStock?'Penjualan dihapus, stok dikembalikan ✓':'Penjualan dihapus (stok tidak berubah)','success');
  renderView();
}

function sisaCicilan(c){
  let sisa=0;
  (c.transaksi||[]).forEach(t=>{ const dibayar=(t.pembayaran||[]).reduce((s,p)=>s+p.jumlah,0); sisa += Math.max(0,(t.total||0)-dibayar); });
  return sisa;
}
function renderPelanggan(host){
  const list=load(K.customers);
  host.innerHTML=`
    <div class="topbar"><div><h2>Pelanggan Cicilan</h2><div class="sub">Tagih & kelola pembayaran cicilan</div></div></div>
    <div class="section">
      ${list.length===0?`<div class="empty"><div class="ico">👥</div>Belum ada pelanggan cicilan.</div>`:
      `<div style="overflow-x:auto"><table><thead><tr><th>Pelanggan</th><th>Kontak</th><th class="text-right">Total</th><th class="text-right">Dibayar</th><th class="text-right">Sisa</th><th></th></tr></thead><tbody>
      ${list.map(c=>{
        const totP=(c.transaksi||[]).reduce((s,t)=>s+(t.total||0),0);
        const totB=(c.transaksi||[]).reduce((s,t)=>s+(t.pembayaran||[]).reduce((x,p)=>x+p.jumlah,0),0);
        const sisa=totP-totB;
        return `<tr><td><b>${esc(c.nama)}</b></td><td>${esc(c.kontak||'-')}</td>
          <td class="text-right">${fmtRp(totP)}</td><td class="text-right">${fmtRp(totB)}</td>
          <td class="text-right"><span class="pill ${sisa>0?'pill-amber':'pill-green'}">${fmtRp(sisa)}</span></td>
          <td class="text-right" style="white-space:nowrap">
            <button class="btn btn-ghost btn-sm" onclick="editPelanggan('${c.id}')">✏️ Edit</button>
            <button class="btn btn-primary btn-sm" onclick="viewPelanggan('${c.id}')">Kelola</button>
          </td>
        </tr>`;
      }).join('')}</tbody></table></div>`}
    </div>
  `;
}
function viewPelanggan(id){
  const c=load(K.customers).find(x=>x.id===id); if(!c) return;
  const salesAll=load(K.sales);
  const totP=(c.transaksi||[]).reduce((s,t)=>s+(t.total||0),0);
  const totB=(c.transaksi||[]).reduce((s,t)=>s+(t.pembayaran||[]).reduce((x,p)=>x+p.jumlah,0),0);
  openModal(`
    <h3>👤 ${esc(c.nama)}</h3>
    <div class="muted" style="margin-bottom:8px">${esc(c.kontak||'-')}</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <span class="pill pill-blue">Total cicil: <b>${fmtRp(totP)}</b></span>
      <span class="pill pill-green">Dibayar: <b>${fmtRp(totB)}</b></span>
      <span class="pill ${(totP-totB)>0?'pill-amber':'pill-green'}">Sisa: <b>${fmtRp(totP-totB)}</b></span>
    </div>
    ${(c.transaksi||[]).slice().sort((a,b)=>b.tanggal-a.tanggal).map(t=>{
      const dibayar=(t.pembayaran||[]).reduce((s,p)=>s+p.jumlah,0);
      const sisa=Math.max(0,t.total-dibayar);
      const sale=salesAll.find(x=>x.id===t.saleId);
      const items=t.items||(sale&&sale.items)||[];
      return `<div class="card" style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;align-items:center">
          <div><b>${fmtDate(t.tanggal)}</b>${t.janjiPelunasan?` · <span style="color:var(--accent)">📝 Janji: ${esc(t.janjiPelunasan)}</span>`:' <span class="muted" style="font-size:11px">(tidak ada janji)</span>'}</div>
          <div class="text-right">
            <div style="font-weight:800">${fmtRp(t.total)}</div>
            <div class="muted" style="font-size:11px">Dibayar ${fmtRp(dibayar)} · Sisa <span style="color:${sisa>0?'var(--warning)':'var(--success)'}">${fmtRp(sisa)}</span></div>
          </div>
        </div>
        ${items.length?`<div style="margin-top:6px;font-size:12px;color:var(--muted)">${items.map(i=>esc(i.nama||'')+(i.varian?' ('+esc(i.varian)+')':'')+(i.qty?' ×'+i.qty:'')).join(', ')}</div>`:''}
        ${(t.pembayaran||[]).length?`<div style="margin-top:8px;border-top:1px dashed var(--border);padding-top:6px">
          <div style="font-size:11.5px;color:var(--muted);margin-bottom:4px"><b>Riwayat Pembayaran:</b></div>
          ${t.pembayaran.slice().sort((a,b)=>b.tanggal-a.tanggal).map(p=>`
            <div style="display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;padding:3px 0">
              <span>${fmtDate(p.tanggal)} · <b>${fmtRp(p.jumlah)}</b></span>
              <span>
                <button class="btn btn-ghost btn-sm" onclick="editPembayaran('${c.id}','${t.id}','${p.id}')">✏️ Edit</button>
                <button class="btn btn-danger btn-sm" onclick="delPembayaran('${c.id}','${t.id}','${p.id}')">×</button>
              </span>
            </div>
          `).join('')}
        </div>`:''}
        ${sisa>0?`<div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <input type="text" inputmode="decimal" id="pay-${t.id}" placeholder="Jumlah bayar" style="flex:1;min-width:120px">
          <button class="btn btn-primary btn-sm" onclick="bayarCicilan('${c.id}','${t.id}')">Catat Bayar</button>
        </div>`:''}
      </div>`;
    }).join('')}
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Tutup</button></div>
  `);
}
function editPelanggan(id){
  const c=load(K.customers).find(x=>x.id===id); if(!c) return;
  openModal(`
    <h3>✏️ Edit Pelanggan</h3>
    <div class="field"><label>Nama</label><input id="cp-nama" value="${esc(c.nama)}"></div>
    <div class="field"><label>Kontak</label><input id="cp-kontak" value="${esc(c.kontak||'')}"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" onclick="savePelangganEdit('${c.id}')">Simpan</button>
    </div>
  `);
}
function savePelangganEdit(id){
  const cs=load(K.customers); const c=cs.find(x=>x.id===id); if(!c) return;
  c.nama=val('cp-nama').trim()||c.nama; c.kontak=val('cp-kontak').trim();
  save(K.customers, cs); closeModal(); toast('Pelanggan diperbarui','success'); renderView();
}
function bayarCicilan(cid, tid){
  const j=+(document.getElementById('pay-'+tid)||{}).value||0;
  if(!j||j<=0){ toast('Masukkan jumlah','danger'); return; }
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=c.transaksi.find(x=>x.id===tid); if(!t) return;
  t.pembayaran=t.pembayaran||[]; t.pembayaran.push({id:uid(),tanggal:Date.now(),jumlah:j});
  save(K.customers,cs);
  logActivity('pelanggan','pelanggan',`Bayar cicilan ${c.nama} ${fmtRp(j)}`, cid);
  toast('Pembayaran dicatat','success'); viewPelanggan(cid);
}
function editPembayaran(cid, tid, pid){
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=(c.transaksi||[]).find(x=>x.id===tid); if(!t) return;
  const p=(t.pembayaran||[]).find(x=>x.id===pid); if(!p) return;
  openModal(`
    <h3>✏️ Edit Pembayaran</h3>
    <div class="muted" style="margin-bottom:8px">${esc(c.nama)} · Transaksi ${fmtDate(t.tanggal)}</div>
    <div class="row">
      <div class="field"><label>Tanggal Bayar</label><input type="date" id="ep-tgl" value="${toDateInput(p.tanggal)}"></div>
      <div class="field"><label>Jumlah *</label><input type="text" inputmode="decimal" id="ep-jml" value="${p.jumlah||0}"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger" onclick="delPembayaran('${cid}','${tid}','${pid}')">Hapus</button>
      <button class="btn btn-ghost" onclick="viewPelanggan('${cid}')">Batal</button>
      <button class="btn btn-primary" onclick="savePembayaranEdit('${cid}','${tid}','${pid}')">Simpan</button>
    </div>
  `);
}
function savePembayaranEdit(cid, tid, pid){
  const j=+val('ep-jml')||0;
  if(!j||j<=0){ toast('Jumlah wajib','danger'); return; }
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=(c.transaksi||[]).find(x=>x.id===tid); if(!t) return;
  const p=(t.pembayaran||[]).find(x=>x.id===pid); if(!p) return;
  p.jumlah=j;
  p.tanggal=new Date(val('ep-tgl')).getTime()||p.tanggal||Date.now();
  save(K.customers,cs);
  logActivity('pelanggan','pelanggan',`Edit pembayaran cicilan ${c.nama} → ${fmtRp(j)}`, cid);
  toast('Pembayaran diperbarui','success'); viewPelanggan(cid);
}
function delPembayaran(cid, tid, pid){
  if(!confirm('Hapus pembayaran ini? Uang akan dikembalikan ke sisa cicilan.')) return;
  const cs=load(K.customers); const c=cs.find(x=>x.id===cid); if(!c) return;
  const t=(c.transaksi||[]).find(x=>x.id===tid); if(!t) return;
  const before=(t.pembayaran||[]).length;
  t.pembayaran=(t.pembayaran||[]).filter(x=>x.id!==pid);
  if(t.pembayaran.length===before){ toast('Pembayaran tidak ditemukan','danger'); return; }
  save(K.customers,cs);
  logActivity('pelanggan','pelanggan',`Hapus pembayaran cicilan ${c.nama}`, cid);
  toast('Pembayaran dihapus','success'); viewPelanggan(cid);
}

function renderShare(host){
  const stock=load(K.stock).filter(p=>(p.qty||0)>0).slice().sort((a,b)=>a.nama.localeCompare(b.nama));
  const allStock=load(K.stock);
  host.innerHTML=`
    <div class="topbar"><div><h2>Share Produk</h2><div class="sub">Bagikan daftar produk ready stok via WhatsApp</div></div></div>
    <div class="section">
      <div class="section-head"><h3>Produk Ready Stok (${stock.length})</h3>
        <div class="actions">
          <button class="btn btn-primary" onclick="shareReadyStock(false)">📤 Share ke WA</button>
          <button class="btn btn-ghost" onclick="shareReadyStock(true)">📤 + Harga Beli</button>
        </div>
      </div>
      ${stock.length===0?`<div class="empty"><div class="ico">📦</div>Tidak ada produk ready stok.</div>`:
      `<div style="overflow-x:auto"><table><thead><tr><th>Produk</th><th class="text-right">Stok</th><th class="text-right">Harga Jual</th></tr></thead><tbody>
      ${stock.map(p=>`<tr>
        <td><b>${esc(p.nama)}</b>${p.varian?` <span class="muted">(${esc(p.varian)})</span>`:''}</td>
        <td class="text-right"><span class="pill pill-green">${p.qty}</span></td>
        <td class="text-right"><b>${fmtRp(p.hargaJual)}</b></td>
      </tr>`).join('')}
      </tbody></table></div>`}
      ${allStock.length>stock.length?`<div class="muted" style="font-size:11.5px;margin-top:8px">${allStock.length-stock.length} produk stok kosong tidak dibagikan.</div>`:''}
    </div>
  `;
}
function shareReadyStock(withBeli){
  const stock=load(K.stock).filter(p=>(p.qty||0)>0).slice().sort((a,b)=>a.nama.localeCompare(b.nama));
  if(stock.length===0){ toast('Tidak ada produk ready stok','danger'); return; }
  const today = new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});
  let text = `*🛒 DAFTAR PRODUK READY STOK*\n_per ${today}_\n\n`;
  stock.forEach((p,idx)=>{
    text += `${idx+1}. *${p.nama}*${p.varian?' ('+p.varian+')':''}\n`;
    text += `   Stok: ${p.qty} pcs · Harga: ${fmtRp(p.hargaJual)}`;
    if(withBeli) text += ` · (modal: ${fmtRp(p.hargaBeli)})`;
    text += `\n`;
  });
  text += `\n💬 Pesan langsung WA untuk pesan.`;
  openModal(`
    <h3>📤 Bagikan Daftar Ready Stok</h3>
    <p class="muted" style="font-size:12px">Edit teks di bawah sebelum dibagikan.</p>
    <textarea id="share-text" rows="12" style="font-family:monospace;font-size:12px">${esc(text)}</textarea>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Tutup</button>
      <button class="btn btn-ghost" onclick="copyShare()">📋 Salin</button>
      <button class="btn btn-primary" onclick="waShare()">💬 Buka WhatsApp</button>
    </div>
  `);
}
function copyShare(){ navigator.clipboard.writeText(document.getElementById('share-text').value).then(()=>toast('Tersalin','success')); }
function waShare(){ const t=encodeURIComponent(document.getElementById('share-text').value); window.open('https://wa.me/?text='+t,'_blank'); }

function fmtTanggalLengkap(d){
  if(!d) return '-';
  const dt=new Date(d);
  const tgl=dt.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const jam=dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}).replace(':','.');
  return tgl+', '+jam;
}
function fmtRpOrDash(n){ return (n>0) ? fmtRp(n) : '-'; }

/* Saldo awal kas (default Rp 0, tanggal = hari ini) */
function getSaldoAwal(){
  try{ const v=JSON.parse(localStorage.getItem(K.saldoAwal)||'null'); if(v) return v; }catch(e){}
  return { jumlah:0, tanggal:Date.now(), catatan:'' };
}
function saveSaldoAwalData(d){ localStorage.setItem(K.saldoAwal, JSON.stringify(d)); }

/* Build a unified cash-flow stream from ALL data sources */
function buildArusKas(){
  const rows=[];
  // 0. Saldo awal kas → ditampilkan sebagai baris pertama (masuk jika +, keluar jika -)
  const sa=getSaldoAwal();
  rows.push({
    at: sa.tanggal||0,
    jenis:'Saldo Awal',
    detail:'Saldo awal kas usaha'+(sa.catatan?' — '+sa.catatan:''),
    keluar: (sa.jumlah||0) < 0 ? -sa.jumlah : 0,
    masuk:  (sa.jumlah||0) > 0 ?  sa.jumlah : 0,
    srcKey:'opening', srcTab:'aruskas',
    edited:false,
  });
  // 1. Penjualan
  //    - Cash → masuk (uang lunas masuk)
  //    - Cicil → KELUAR (piutang: stok keluar tapi uang belum masuk, jadi kas minus dulu;
  //              pembayaran cicilan nanti akan menambah masuk sehingga arus kas kembali positif)
  load(K.sales).forEach(s=>{
    const refTotal = s.totalAdmin || s.total || 0;
    if(s.metode==='cash'){
      rows.push({
        at:s.tanggal||0,
        jenis:'Penjualan',
        detail:'Penjualan cash'+(s.pelangganNama?' ('+s.pelangganNama+')':' (umum)'),
        keluar:0, masuk:refTotal,
        srcKey:'sale:'+s.id, srcTab:'penjualan',
        edited:false,
      });
    } else if(s.metode==='cicil'){
      rows.push({
        at:s.tanggal||0,
        jenis:'Penjualan',
        detail:'Penjualan cicilan'+(s.pelangganNama?' ('+s.pelangganNama+')':'')+' — piutang',
        keluar:refTotal, masuk:0,
        srcKey:'salecicil:'+s.id, srcTab:'penjualan',
        edited:false,
      });
    }
  });
  // 2. Pembayaran cicilan pelanggan → masuk
  load(K.customers).forEach(c=>{
    (c.transaksi||[]).forEach(t=>{
      (t.pembayaran||[]).forEach(p=>{
        rows.push({
          at:p.tanggal||0,
          jenis:'Cicilan',
          detail:'Pembayaran cicilan ('+c.nama+')',
          keluar:0, masuk:p.jumlah||0,
          srcKey:'pay:'+p.id, srcTab:'pelanggan',
          edited:false,
        });
      });
    });
  });
  // 3. Order ke supplier → keluar (status received gunakan tanggalTerima, else tanggal order)
  load(K.orders).forEach(o=>{
    const supName=(load(K.suppliers).find(s=>s.id===o.supplierId)||{}).nama || o.supplierNama || 'Supplier';
    rows.push({
      at:o.tanggalTerima||o.tanggal||0,
      jenis:'Stok',
      detail:'Order supplier ('+supName+')',
      keluar:o.totalBiaya||0, masuk:0,
      srcKey:'order:'+o.id, srcTab:'simulasiorder',
      edited:false,
    });
  });
  // 4. Pengeluaran operasional → keluar
  load(K.expenses).forEach(e=>{
    rows.push({
      at:e.tanggal||0,
      jenis:'Pengeluaran',
      detail:(e.kategori||'Pengeluaran')+(e.keterangan?' — '+e.keterangan:''),
      keluar:e.jumlah||0, masuk:0,
      srcKey:'exp:'+e.id, srcTab:'pengeluaran',
      edited:false,
    });
  });
  // 5. Hutang bank: pencairan → masuk, angsuran → keluar
  load(K.bankDebts).forEach(d=>{
    rows.push({
      at:d.tanggal||0,
      jenis:'Hutang Bank',
      detail:'Pencairan pinjaman ('+(d.nama||d.bank||'-')+')',
      keluar:0, masuk:d.totalPinjaman||0,
      srcKey:'debt:'+d.id, srcTab:'hutang',
      edited:false,
    });
    (d.pembayaran||[]).forEach(p=>{
      rows.push({
        at:p.tanggal||0,
        jenis:'Hutang Bank',
        detail:'Angsuran '+(d.nama||d.bank||'-'),
        keluar:p.jumlah||0, masuk:0,
        srcKey:'debtpay:'+p.id, srcTab:'hutang',
        edited:false,
      });
    });
  });
  // 6. Setoran reseller → masuk (uang masuk ke admin)
  load(K.resellerSetoran).forEach(s=>{
    rows.push({
      at:s.at||0,
      jenis:'Setoran',
      detail:'Setoran user ('+(s.resellerNama||'-')+')',
      keluar:0, masuk:s.amount||0,
      srcKey:'setor:'+s.id, srcTab:'reseller',
      edited:false,
    });
  });

  // Sort ascending by time (oldest first) — saldo berjalan
  rows.sort((a,b)=>(a.at||0)-(b.at||0));
  let saldo=0;
  rows.forEach(r=>{
    saldo += (r.masuk||0) - (r.keluar||0);
    r.saldo = saldo;
  });

  return rows;
}


function akJenisClass(j){
  return 'ak-jenis-'+(j.toLowerCase().split(' ')[0].replace('hutang','hutang').replace('piutang','piutang'));

      <div class="card"><h3>Total Keluar</h3><div class="val" style="color:#B91C1C">${fmtRp(totKeluar)}</div><div class="delta">${rows.filter(r=>r.keluar>0).length} transaksi</div></div>

function akEdit(srcKey, srcTab){
  if(srcKey==='opening'){ openSaldoAwal(); return; }
  toast('Membuka tab sumber untuk mengedit entri ini','info');
  go(srcTab);
}

function akDelete(srcKey){
  if(!srcKey) return;
  const row = buildArusKas().find(r=>r.srcKey===srcKey) || {};
  const jenis = row.jenis||''; const detail = row.detail||'';
  if(!confirm(`Hapus entri arus kas ini?\n\n${jenis} — ${detail}\n\nData sumbernya juga akan dihapus dan tidak bisa dikembalikan.`)) return;
  const i = srcKey.indexOf(':');
  const type = i<0 ? srcKey : srcKey.slice(0,i);
  const id   = i<0 ? '' : srcKey.slice(i+1);
  try{
    if(type==='opening'){
      saveSaldoAwalData({jumlah:0, tanggal:Date.now(), catatan:''});
    } else if(type==='sale' || type==='salecicil'){
      save(K.sales, load(K.sales).filter(s=>String(s.id)!==id));
    } else if(type==='order'){
      save(K.orders, load(K.orders).filter(o=>String(o.id)!==id));
    } else if(type==='exp'){
      save(K.expenses, load(K.expenses).filter(e=>String(e.id)!==id));
    } else if(type==='debt'){
      save(K.bankDebts, load(K.bankDebts).filter(d=>String(d.id)!==id));
    } else if(type==='debtpay'){
      const arr=load(K.bankDebts);
      arr.forEach(d=>{ d.pembayaran=(d.pembayaran||[]).filter(p=>String(p.id)!==id); });
      save(K.bankDebts, arr);
    } else if(type==='pay'){
      const arr=load(K.customers);
      arr.forEach(c=>(c.transaksi||[]).forEach(t=>{ t.pembayaran=(t.pembayaran||[]).filter(p=>String(p.id)!==id); }));
      save(K.customers, arr);
    } else if(type==='setor'){
      save(K.resellerSetoran, load(K.resellerSetoran).filter(s=>String(s.id)!==id));
    } else {
      toast('Jenis entri tidak dikenal','error'); return;
    }
    logActivity('aruskas', jenis||'arus kas', 'Hapus entri: '+(detail||srcKey));
    toast('Entri dihapus','success');
    renderView();
  }catch(err){
    console.error(err);
    toast('Gagal menghapus entri','error');
  }
}



function exportAKCsv(){
  const rows=buildArusKas();
  const header=['No','Waktu','Jenis','Detail','Keluar','Masuk','Saldo'];
  const lines=[header.join(',')];
  rows.forEach((r,i)=>{
    const cells=[
      i+1,
      '"'+fmtTanggalLengkap(r.at)+'"',
      r.jenis,
      '"'+(r.detail||'').replace(/"/g,'""')+'"',
      r.keluar||0, r.masuk||0, r.saldo||0,
    ];
    lines.push(cells.join(','));
  });
  const blob=new Blob([lines.join('\n')], {type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='arus-kas-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

window._gsStatus = 'idle'; // 'idle' | 'on' | 'off'
function renderGSChip(){
  const cfg=getGSConfig();
  const label = !cfg.url ? 'GSheets: Belum diset'
              : window._gsStatus==='on' ? 'GSheets: Tersambung'
              : window._gsStatus==='off' ? 'GSheets: Gagal'
              : 'GSheets: Cek…';
  const cls = !cfg.url ? 'idle' : window._gsStatus;
  const html = `<span class="gs-chip ${cls}" onclick="pingGS(true)" title="Klik untuk tes ulang"><span class="dot"></span>${label}</span>`;
  const w1=document.getElementById('gs-chip-wrap'); if(w1) w1.innerHTML=html;
  const w2=document.getElementById('gs-chip-mobile-wrap'); if(w2) w2.innerHTML=html;
}
async function pingGS(manual){
  window._gsStatus='idle'; renderGSChip();
  try{
    const ctl = new AbortController();
    const t = setTimeout(()=>ctl.abort(), 8000);
    const res = await fetch(SUPABASE_URL+'/rest/v1/'+SB_TABLE+'?select=key&limit=1', {
      method:'GET', headers: SB_HEADERS, signal: ctl.signal
    });
    clearTimeout(t);
    if(!res.ok) throw new Error('HTTP '+res.status);
    window._gsStatus='on';
    if(manual) toast('Supabase tersambung ✓','success');
  }catch(e){
    window._gsStatus='off';
    if(manual) toast('Gagal terhubung: '+e.message,'danger');
  }
  renderGSChip();
}

async function pullFromCloud(){
  toast('Menarik data dari Supabase…');
  const markAttempt = (ok, msg)=>{
    const c=getGSConfig();
    c.lastSyncAttempt=Date.now();
    if(ok){ c.lastSync=Date.now(); c.lastSyncStatus='success'; c.lastSyncError=''; }
    else { c.lastSyncStatus='error'; c.lastSyncError=msg||''; }
    save(K.gsConfig, c);
  };
  try{
    const res = await fetch(SUPABASE_URL+'/rest/v1/'+SB_TABLE+'?select=key,value', {
      method:'GET', headers: SB_HEADERS
    });
    if(!res.ok) throw new Error('HTTP '+res.status+' '+(await res.text()));
    const rows = await res.json();
    const data={};
    rows.forEach(r=>{ data[r.key]=r.value; });
    let imported=0;
    Object.keys(K).forEach(k=>{
      if(k==='gsConfig') return;
      const sheetKey = K[k].replace('bld_','');
      if(data[sheetKey] !== undefined){
        save(K[k], data[sheetKey]);
        imported++;
      }
    });
    markAttempt(true);
    toast(`Data ditarik (${imported} tabel) ✓`,'success');
    renderView();
  }catch(e){
    markAttempt(false, e.message);
    toast('Gagal terhubung: '+e.message,'danger');
    renderView();
  }
}

async function pushToCloud(){
  if(!confirm('Dorong semua data lokal ke Supabase? Data di cloud akan ditimpa.')) return;
  toast('Mendorong data ke Supabase…');
  const markAttempt = (ok, msg)=>{
    const c=getGSConfig();
    c.lastSyncAttempt=Date.now();
    if(ok){ c.lastSync=Date.now(); c.lastSyncStatus='success'; c.lastSyncError=''; }
    else { c.lastSyncStatus='error'; c.lastSyncError=msg||''; }
    save(K.gsConfig, c);
  };
  try{
    const nowIso = new Date().toISOString();
    const rows=[];
    Object.keys(K).forEach(k=>{
      if(k==='gsConfig') return;
      const sheetKey = K[k].replace('bld_','');
      rows.push({ key: sheetKey, value: load(K[k]), updated_at: nowIso });
    });
    const res = await fetch(SUPABASE_URL+'/rest/v1/'+SB_TABLE+'?on_conflict=key', {
      method:'POST',
      headers: Object.assign({}, SB_HEADERS, {'Prefer':'resolution=merge-duplicates,return=minimal'}),
      body: JSON.stringify(rows)
    });
    if(!res.ok) throw new Error('HTTP '+res.status+' '+(await res.text()));
    markAttempt(true);
    toast('Semua data berhasil disinkron ke Supabase ✓','success');
    renderView();
  }catch(e){
    markAttempt(false, e.message);
    toast('Gagal terhubung: '+e.message,'danger');
    renderView();
  }
}

function saveBankFee(){
  const p=+val('cfg-fee'); if(isNaN(p)||p<0){ toast('Persentase tidak valid','danger'); return; }
  setSettings({bankFeePct:p}); toast('Pengaturan disimpan','success');

function exportAll(){
  const data={}; Object.keys(K).forEach(k=>data[k]=load(K[k]));
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='motubu-backup-v15.9-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importAll(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{
    const data=JSON.parse(r.result);
    if(!confirm('Tindih semua data dengan isi file?')) return;
    Object.keys(K).forEach(k=>{ if(data[k]) save(K[k],data[k]); });
    toast('Data dipulihkan','success'); renderView();
  }catch(e){ toast('File tidak valid','danger'); }};
  r.readAsText(f);
}
function resetAll(){
  if(!confirm('HAPUS SEMUA DATA?')) return;
  if(!confirm('Konfirmasi sekali lagi — tindakan ini permanen.')) return;
  Object.keys(K).forEach(k=>localStorage.removeItem(K[k]));
  toast('Direset','success'); location.reload();
}
